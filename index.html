// ── Voice Input ───────────────────────────────────────────────────────────────
function startVoice(onResult) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Голосовой ввод не поддерживается в вашем браузере"); return; }
  const r = new SR();
  r.lang = "ru-RU";
  r.interimResults = false;
  r.maxAlternatives = 1;
  r.onresult = function(e) { onResult(e.results[0][0].transcript); };
  r.onerror = function(e) { if(e.error!=="aborted") alert("Ошибка микрофона: "+e.error); };
  r.start();
  return r;
}

// Voice button component
function MicBtn(props) {
  const [active, setActive] = useState(false);
  const recRef = useRef(null);
  function toggle() {
    if (active) {
      if (recRef.current) recRef.current.stop();
      setActive(false);
    } else {
      recRef.current = startVoice(function(text) {
        props.onResult(text);
        setActive(false);
      });
      if (recRef.current) setActive(true);
    }
  }
  return h("button", {
    onClick: toggle,
    title: active ? "Остановить запись" : "Голосовой ввод",
    style: {
      width: 34, height: 34, borderRadius: "50%", border: "none", cursor: "pointer",
      background: active ? "#e53935" : "#f1f8e9",
      color: active ? "#fff" : "#4caf50",
      fontSize: 16, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
      boxShadow: active ? "0 0 0 3px rgba(229,57,53,0.3)" : "none",
      transition: "all 0.2s"
    }
  }, active ? "⏹" : "🎤");
}

function DayRow(props) {
  const [ed,setEd]=useState(false);
  const [dr,setDr]=useState("");
  const ref=useRef();
  useEffect(function(){if(ed&&ref.current)ref.current.focus();},[ed]);
  const commit=function(){props.onSet(Math.max(0,parseInt(dr)||0));setEd(false);};
  const active=props.portions>0;
  const rowTotal=props.dishCost*(props.portions||0);
  return h("div",{style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,marginBottom:5,border:"1.5px solid "+(active?"#c8e6c9":"#f0f0f0"),background:active?"#fafff8":"#fff",opacity:props.chefDone?0.5:1}},
    h("span",{style:{fontSize:22,flexShrink:0,opacity:active?1:0.4}},props.dish.emoji),
    h("div",{style:{flex:1,minWidth:0}},
      h("span",{style:{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:12,color:"#1b5e20",opacity:active?1:0.55}},props.dish.name),
      props.chefDone && h("span",{style:{marginLeft:8,fontSize:11,color:"#4caf50",fontWeight:600}},"✓ Готово")
    ),
    h("span",{style:{width:90,textAlign:"center",fontSize:12,color:props.dishCost>0?"#e65100":"#ccc",fontWeight:500}},props.dishCost>0?(props.dishCost.toFixed(2)+" ₽"):"—"),
    h("div",{style:{width:130,display:"flex",justifyContent:"center"}},
      ed&&!props.readOnly
        ? h("div",{style:{display:"flex",alignItems:"center",gap:4}},
            h("input",{ref:ref,type:"number",min:"0",step:"1",style:{width:56,padding:"4px 7px",borderRadius:8,border:"1.5px solid #4caf50",fontSize:13,textAlign:"right",background:"#fff",color:"#2d4a2e"},value:dr,onChange:function(e){setDr(e.target.value);},onFocus:selAll,onKeyDown:function(e){if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);},onBlur:commit}),
            h("button",{style:{padding:"3px 7px",background:"#4caf50",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:12},onMouseDown:function(e){e.preventDefault();commit();}},"✓")
          )
        : h("button",{style:{display:"flex",alignItems:"center",gap:3,padding:"4px 9px",borderRadius:18,border:"1.5px solid "+(active?"#a5d6a7":"#e0e0e0"),background:active?"#e8f5e9":"#f5f5f5",cursor:props.readOnly?"default":"pointer"},onClick:props.readOnly?undefined:function(){setDr(String(props.portions));setEd(true);}},
            h("span",{style:{fontSize:13,fontWeight:600,color:active?"#2e7d32":"#999"}},props.portions),
            h("span",{style:{fontSize:10,color:active?"#81c784":"#bbb"}},"порц."),
            !props.readOnly && h("span",{style:{fontSize:10,color:"#c8e6c9"}},"✎")
          )
    ),
    h("span",{style:{width:100,textAlign:"right",fontSize:13,fontWeight:rowTotal>0?700:400,color:rowTotal>0?"#e65100":"#ccc"}},rowTotal>0?(rowTotal.toFixed(2)+" ₽"):"—")
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [dishes,setDishes]=useState(function(){return ls.get("eco_dishes",DEF_DISHES);});
  const [ingredients,setIngredients]=useState(function(){return ls.get("eco_ingredients",DEF_ING);});
  const [taraList,setTaraList]=useState(function(){return ls.get("eco_tara",DEF_TARA);});
  const [cooks,setCooks]=useState(function(){return ls.get("eco_cooks",DEF_COOKS);});
  const [fbLoaded,setFbLoaded]=useState(false);
  const [dayPortions,setDayPortions]=useState({});
  const [chefDone,setChefDone]=useState({});
  const [savedDates,setSavedDates]=useState([]);
  const [scheduleData,setScheduleData]=useState({});
  const [purchases,setPurchases]=useState({});
  const [purchaseDone,setPurchaseDone]=useState({});
  const [chefShopping,setChefShopping]=useState({});
  const [warehouse,setWarehouse]=useState({});
  const [chatMsgs,setChatMsgs]=useState([]);
  const [tab,setTab]=useState("dishes");
  const [badges,setBadges]=useState({daymenu:0,purchases:0,schedule:0});
  const [menuDate,setMenuDate]=useState(TODAY);
  const [scheduleDate,setScheduleDate]=useState(TODAY);
  const [purchaseDate,setPurchaseDate]=useState(TODAY);
  const [periodFrom,setPeriodFrom]=useState(TODAY);
  const [periodTo,setPeriodTo]=useState(TODAY);
  const [showPeriod,setShowPeriod]=useState(false);
  const [chatOpen,setChatOpen]=useState(false);
  const [chatInput,setChatInput]=useState("");
  const [chatUnread,setChatUnread]=useState(0);
  const [chefCalling,setChefCalling]=useState(false);
  const [syncDot,setSyncDot]=useState("ok");
  const [published,setPublished]=useState(false);
  const [dishSearch,setDishSearch]=useState("");
  const [ingSearch,setIngSearch]=useState("");
  const [modal,setModal]=useState(null);
  const [mData,setMData]=useState({});
  const [editIngUnit,setEditIngUnit]=useState(null);
  const [editCook,setEditCook]=useState(null);
  const [editTara,setEditTara]=useState(null);
  const [editPurchase,setEditPurchase]=useState(null);
  const [editWarehouse,setEditWarehouse]=useState(null);
  const [addingPurchase,setAddingPurchase]=useState(false);
  const [showAddWarehouse,setShowAddWarehouse]=useState(false);
  const chatEndRef=useRef();
  const isRO=menuDate<TODAY;

  // ── Sync reference data with Firebase ────────────────────────────────────
  // Load FROM Firebase on startup, then keep in sync
  useEffect(function(){
    var loaded={dishes:false,ingredients:false,tara:false,cooks:false};
    function checkLoaded(){if(Object.values(loaded).every(Boolean))setFbLoaded(true);}

    db.ref("dishes").once("value",function(s){
      const d=s.val();if(d&&Array.isArray(d)){setDishes(d);ls.set("eco_dishes",d);}
      loaded.dishes=true;checkLoaded();
    });
    db.ref("ingredients").once("value",function(s){
      const d=s.val();if(d&&Array.isArray(d)){setIngredients(d);ls.set("eco_ingredients",d);}
      loaded.ingredients=true;checkLoaded();
    });
    db.ref("tara").once("value",function(s){
      const d=s.val();if(d&&Array.isArray(d)){setTaraList(d);ls.set("eco_tara",d);}
      loaded.tara=true;checkLoaded();
    });
    db.ref("cooks").once("value",function(s){
      const d=s.val();if(d&&Array.isArray(d)){setCooks(d);ls.set("eco_cooks",d);}
      loaded.cooks=true;checkLoaded();
    });
  },[]);

  // Save changes back to Firebase (only after initial load)
  const dishesRef=useRef(dishes);
  useEffect(function(){
    if(!fbLoaded)return;
    dishesRef.current=dishes;
    ls.set("eco_dishes",dishes);
    db.ref("dishes").set(dishes).catch(function(){});
  },[dishes,fbLoaded]);

  useEffect(function(){
    if(!fbLoaded)return;
    ls.set("eco_ingredients",ingredients);
    db.ref("ingredients").set(ingredients).catch(function(){});
  },[ingredients,fbLoaded]);

  useEffect(function(){
    if(!fbLoaded)return;
    ls.set("eco_tara",taraList);
    db.ref("tara").set(taraList).catch(function(){});
  },[taraList,fbLoaded]);

  useEffect(function(){
    if(!fbLoaded)return;
    ls.set("eco_cooks",cooks);
    db.ref("cooks").set(cooks).catch(function(){});
  },[cooks,fbLoaded]);

  useEffect(function(){
    db.ref("daymenu").on("value",function(s){const d=s.val();setSavedDates(d?Object.keys(d).sort().reverse():[]);});
    db.ref("purchases").on("value",function(s){setPurchases(s.val()||{});});
    db.ref("warehouse").on("value",function(s){setWarehouse(s.val()||{});});
    var lastCall=null;
    db.ref("callAdmin").on("value",function(s){
      const v=s.val();
      if(v&&v.ts&&v.ts!==lastCall&&lastCall!==null){
        setChefCalling(true);setTimeout(function(){setChefCalling(false);},15000);
        sndAlert();
        if(Notification.permission==="granted") new Notification("📞 Повар вызывает!",{body:"Зайдите на кухню",tag:"chef-call",requireInteraction:true});
      }
      lastCall=v&&v.ts?v.ts:null;
    });
    var prevLen=null;
    db.ref("chat").limitToLast(100).on("value",function(s){
      const d=s.val();
      const msgs=d?Object.values(d).sort(function(a,b){return a.ts-b.ts;}).filter(function(m){return m&&m.ts;}):[];
      if(prevLen!==null&&msgs.length>prevLen){const n=msgs[msgs.length-1];if(n&&n.sender==="chef")sndRecv();}
      prevLen=msgs.length;
      setChatMsgs(msgs);
      const seen=ls.get("chat_seen",0);
      setChatUnread(msgs.filter(function(m){return m.sender==="chef"&&m.ts>seen;}).length);
    });
    const cut=Date.now()-90*24*60*60*1000;
    db.ref("chat").once("value",function(s){const d=s.val();if(d)Object.entries(d).forEach(function(e){if(e[1].ts<cut)db.ref("chat/"+e[0]).remove();});});
    const lastChanged=ls.get("schedule_last_changed",0);
    if(new Date(lastChanged).toISOString().slice(0,10)!==TODAY) setBadges(function(p){return Object.assign({},p,{schedule:1});});
    if("Notification"in window&&Notification.permission==="default") Notification.requestPermission();
  },[]);

  useEffect(function(){
    const ref=db.ref("daymenu/"+menuDate);
    var first=true;
    ref.on("value",function(s){
      const d=s.val()||{};
      if(!first&&tab!=="daymenu") setBadges(function(p){return Object.assign({},p,{daymenu:p.daymenu+1});});
      first=false;
      setDayPortions(d.portions||{});setChefDone(d.done||{});
    });
    return function(){ref.off();};
  },[menuDate]);

  useEffect(function(){
    const ref=db.ref("schedule/"+scheduleDate);
    ref.on("value",function(s){setScheduleData(s.val()||{});});
    return function(){ref.off();};
  },[scheduleDate]);

  useEffect(function(){
    const ref=db.ref("purchaseDone/"+purchaseDate);
    ref.on("value",function(s){setPurchaseDone(s.val()||{});});
    return function(){ref.off();};
  },[purchaseDate]);

  useEffect(function(){
    var first=true,prev="";
    const ref=db.ref("chefShopping/"+TODAY);
    ref.on("value",function(s){
      const d=s.val()||{};const str=JSON.stringify(d);
      if(!first&&str!==prev&&Object.values(d).some(function(v){return v>0;})){
        sndAlert();
        if(Notification.permission==="granted") new Notification("🛒 Повар обновил список!",{body:"Проверьте Закупки",tag:"chef-shop"});
        setBadges(function(p){return Object.assign({},p,{purchases:p.purchases+1});});
      }
      prev=str;first=false;setChefShopping(d);
    });
    return function(){ref.off();};
  },[]);

  function getCP(ingId){
    var latest=null,latestId=0;
    Object.values(purchases).forEach(function(list){
      (list||[]).forEach(function(p){
        if(p.ingId===ingId&&p.costPer!=null&&p.id>latestId){latestId=p.id;latest=p.costPer;}
      });
    });
    return latest;
  }
  function dishCost(dish){return dish.ingredients.reduce(function(s,di){const cp=getCP(di.id);return cp!==null?s+cp*di.amount:s;},0)+(dish.taraCost||0);}
  function dishMissing(dish){return dish.ingredients.filter(function(di){return getCP(di.id)===null;}).map(function(di){const i=ingredients.find(function(x){return x.id===di.id;});return i?i.name:null;}).filter(Boolean);}

  const activeDay=dishes.map(function(d){return {dish:d,portions:dayPortions[d.id]||0};}).filter(function(x){return x.portions>0;});
  const dayTotal=activeDay.reduce(function(s,x){return s+dishCost(x.dish)*x.portions;},0);
  const dayPortionsTotal=activeDay.reduce(function(s,x){return s+x.portions;},0);
  const doneCount=activeDay.filter(function(x){return chefDone[x.dish.id];}).length;

  function dayIngTotals(){
    const t={};
    activeDay.forEach(function(x){x.dish.ingredients.forEach(function(di){t[di.id]=(t[di.id]||0)+di.amount*x.portions;});});
    return Object.entries(t).map(function(e){return {ing:ingredients.find(function(i){return i.id===Number(e[0]);}),total:e[1]};}).filter(function(x){return x.ing;});
  }

  const workingCooks=cooks.filter(function(c){return scheduleData[c.id];});
  const totalSalary=workingCooks.reduce(function(s,c){return s+c.salary;},0);
  const dayPurchases=purchases[purchaseDate]||[];
  const dayPurchaseTotal=dayPurchases.reduce(function(s,p){return s+(p.amount||0);},0);
  const periodPurchases=Object.entries(purchases).filter(function(e){return e[0]>=periodFrom&&e[0]<=periodTo;}).sort(function(a,b){return a[0].localeCompare(b[0]);});
  const periodTotal=periodPurchases.reduce(function(s,e){return s+e[1].reduce(function(ss,p){return ss+(p.amount||0);},0);},0);
  const chefShoppingItems=Object.entries(chefShopping).map(function(e){return {ing:ingredients.find(function(i){return i.id===Number(e[0]);}),qty:e[1]};}).filter(function(x){return x.ing&&x.qty>0;});
  const allDone=dayPurchases.length>0&&dayPurchases.every(function(p){return purchaseDone[p.id];});
  const warehouseTotal=Object.entries(warehouse).reduce(function(s,e){return s+(e[1].qty||0)*(e[1].costPer||0);},0);

  // ── Recent suppliers ────────────────────────────────────────────────────────
  const recentSuppliers = [...new Set(
    Object.values(purchases).flatMap(function(list){return (list||[]).map(function(p){return p.supplier;});}).filter(Boolean)
  )].slice(0,8);
  (purchases[TODAY]||[]).forEach(function(p){
    if(!p.ingId||!p.quantity) return;
    const req=Number(chefShopping[p.ingId])||0;
    const extra=Number(p.quantity)-req;
    if(extra>0){if(!excess[p.ingId])excess[p.ingId]={qty:0,costPer:p.costPer||0};excess[p.ingId].qty+=extra;}
  });

  const visCats=[...new Set(ingredients.filter(function(i){return i.name.toLowerCase().includes(ingSearch.toLowerCase());}).map(function(i){return i.category;}))];

  function markTab(key){setTab(key);setBadges(function(p){return Object.assign({},p,{[key]:0});});}

  function savePortions(p){
    setSyncDot("saving");
    db.ref("daymenu/"+menuDate+"/portions").set(p).then(function(){setSyncDot("ok");}).catch(function(){setSyncDot("ok");});
  }
  function setPortions(dishId,val){
    if(isRO) return;
    const n=Math.max(0,parseInt(val)||0);
    setDayPortions(function(prev){const next=Object.assign({},prev,{[dishId]:n});savePortions(next);return next;});
  }
  function addDish(){
    const name=mData.name,emoji=mData.emoji;if(!name)return;
    if(dishes.some(function(d){return d.name.trim().toLowerCase()===name.trim().toLowerCase();})){alert("Блюдо с таким названием уже существует");return;}
    setDishes(function(p){return [...p,{id:Date.now(),name:name,emoji:emoji||"🍽️",taraCost:0,taraId:null,ingredients:[]}];});
    setModal(null);setMData({});
  }
  function addIng(){
    const name=mData.name;if(!name)return;
    setIngredients(function(p){return [...p,{id:Date.now(),name:name,unit:mData.unit||"кг",category:mData.category||"Овощи"}];});
    setModal(null);setMData({});
  }
  function addTara(){
    const name=mData.name;if(!name)return;
    setTaraList(function(p){return [...p,{id:Date.now(),name:name,cost:Number(mData.cost)||0}];});
    setModal(null);setMData({});
  }
  function addCook(){
    const name=mData.name;if(!name)return;
    setCooks(function(p){return [...p,{id:Date.now(),name:name,salary:Number(mData.salary)||0}];});
    setModal(null);setMData({});
  }
  function saveCook(id,name,salary){setCooks(function(p){return p.map(function(c){return c.id===id?Object.assign({},c,{name:name,salary:Number(salary)}):c;});});setEditCook(null);}
  function saveTara(id,name,cost){
    setTaraList(function(p){return p.map(function(t){return t.id===id?Object.assign({},t,{name:name,cost:Number(cost)}):t;});});
    setDishes(function(p){return p.map(function(d){return d.taraId===id?Object.assign({},d,{taraCost:Number(cost),taraName:name}):d;});});
    setEditTara(null);
  }
  function deleteTara(id){
    setTaraList(function(p){return p.filter(function(t){return t.id!==id;});});
    setDishes(function(p){return p.map(function(d){return d.taraId===id?Object.assign({},d,{taraId:null,taraCost:0}):d;});});
  }
  function toggleCook(id){
    db.ref("schedule/"+scheduleDate+"/"+id).set(!(scheduleData[id]||false)).catch(function(){});
    ls.set("schedule_last_changed",Date.now());
    setBadges(function(p){return Object.assign({},p,{schedule:0});});
  }
  function addPurchase(){
    const sup=mData.supplier,amt=Number(mData.amount)||0;if(!sup||!amt)return;
    const qty=Number(mData.quantity)||0;
    const costPer=mData.ingId&&qty>0?amt/qty:null;
    const entry={id:Date.now(),supplier:sup,ingId:mData.ingId?Number(mData.ingId):null,quantity:qty,amount:amt,costPer:costPer};
    db.ref("purchases/"+purchaseDate).set([...dayPurchases,entry]).catch(function(){});
    ls.set("purchase_last_changed",Date.now());
    setAddingPurchase(false);setMData({});
  }
  function deletePurchase(date,id){
    const list=(purchases[date]||[]).filter(function(p){return p.id!==id;});
    db.ref("purchases/"+date).set(list.length?list:null).catch(function(){});
  }
  function togglePurchaseDone(id){db.ref("purchaseDone/"+purchaseDate+"/"+id).set(!purchaseDone[id]).catch(function(){});}
  function finishAll(){const done={};dayPurchases.forEach(function(p){done[p.id]=true;});db.ref("purchaseDone/"+purchaseDate).set(done).catch(function(){});}
  function saveWarehouse(ingId,qty,costPer){
    db.ref("warehouse/"+ingId).set({qty:Number(qty)||0,costPer:Number(costPer)||0,lastUpdated:Date.now()}).catch(function(){});
    setEditWarehouse(null);setShowAddWarehouse(false);setMData({});
  }
  function removeWarehouse(ingId){db.ref("warehouse/"+ingId).remove().catch(function(){});}
  function addExcess(ingId,qty,costPer){
    const cur=warehouse[ingId]||{qty:0,costPer:0};
    saveWarehouse(ingId,(cur.qty||0)+qty,costPer||cur.costPer);
  }
  function compress(file){return new Promise(function(r){const rd=new FileReader();rd.onload=function(e){const img=new Image();img.onload=function(){const MAX=900,ratio=Math.min(MAX/img.width,MAX/img.height,1);const cv=document.createElement("canvas");cv.width=Math.round(img.width*ratio);cv.height=Math.round(img.height*ratio);cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);r(cv.toDataURL("image/jpeg",0.75));};img.src=e.target.result;};rd.readAsDataURL(file);});}
  function sendMsg(text,img){
    if(!text&&!img)return;
    sndSend();
    db.ref("chat/"+Date.now()).set({id:Date.now(),ts:Date.now(),sender:"admin",text:text||"",image:img||null}).catch(function(){});
    setChatInput("");
  }
  function openChat(){setChatOpen(true);setChatUnread(0);ls.set("chat_seen",Date.now());setTimeout(function(){chatEndRef.current&&chatEndRef.current.scrollIntoView({behavior:"smooth"});},100);}

  const TABS=[
    {key:"dishes",label:"🍽️ Блюда"},
    {key:"ingredients",label:"🥬 Ингред."},
    {key:"tara",label:"📦 Тара"},
    {key:"daymenu",label:"📋 Меню",badge:badges.daymenu},
    {key:"schedule",label:"👨‍🍳 График",badge:badges.schedule},
    {key:"purchases",label:"🛒 Закупки",badge:badges.purchases},
    {key:"warehouse",label:"🏪 Склад"},
  ];

  // Search box
  function SearchBox(val,onChange,placeholder){
    return h("div",{style:{display:"flex",alignItems:"center",gap:8,background:"#fff",border:"1.5px solid #e8f5e9",borderRadius:12,padding:"8px 12px",marginBottom:12}},
      h("span",null,"🔍"),
      h("input",{style:{flex:1,border:"none",background:"none",fontSize:14,fontFamily:"'Geologica',sans-serif",color:"#2d4a2e",outline:"none"},placeholder:placeholder,value:val,onChange:onChange}),
      val&&h("button",{style:{background:"none",border:"none",color:"#bdbdbd",cursor:"pointer"},onClick:function(){onChange({target:{value:""}});}},  "✕")
    );
  }

  return h("div",{style:{minHeight:"100vh"}},
    // Header
    h("header",{style:{background:"#fff",borderBottom:"2px solid #e8f5e9",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px rgba(76,153,80,0.08)",position:"sticky",top:0,zIndex:100,gap:10}},
      h("div",{style:{display:"flex",alignItems:"center",gap:10,flexShrink:0}},
        h("span",{style:{fontSize:28}},"🌿"),
        h("div",null,
          h("div",{style:{fontFamily:"'Unbounded',sans-serif",fontWeight:800,fontSize:16,color:"#2e7d32"}},
            "Эколавка ",
            h("span",{style:{width:8,height:8,borderRadius:"50%",display:"inline-block",background:syncDot==="saving"?"#ffa726":"#4caf50",verticalAlign:"middle"}})
          ),
          h("div",{style:{fontSize:10,color:"#81c784"}},"Администратор")
        )
      ),
      h("div",{style:{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}},
        TABS.map(function(t){
          return h("button",{key:t.key,onClick:function(){markTab(t.key);},style:Object.assign({},S.tabBtn,tab===t.key?S.tabBtnA:{})},
            t.label,
            t.badge>0 && h("span",{style:{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#e53935",color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}},t.badge)
          );
        })
      )
    ),

    // Main
    h("main",{style:{maxWidth:920,margin:"0 auto",padding:"16px 14px"}},

      // Chef calling banner
      chefCalling && h("div",{style:{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"linear-gradient(135deg,#e65100,#ff6d00)",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 4px 24px rgba(230,81,0,0.5)"}},
