<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Эколавка" />
  <title>Эколавка — Администратор</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Geologica:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(135deg,#f1f8e9 0%,#e8f5e9 50%,#f9fbe7 100%); min-height: 100vh; font-family: 'Geologica', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 2px; }
    .tab-btn { transition: all 0.2s; }
    .tab-btn:hover { opacity: 0.85; }
    .dish-top { cursor: pointer; user-select: none; transition: background 0.15s; border-radius: 16px; }
    .dish-top:hover { background: #fafff8; }
    .ing-dish-row { transition: background 0.12s; border-radius: 8px; }
    .ing-dish-row:hover { background: #f9fbe7; }
    .qty-badge { transition: all 0.15s; }
    .qty-badge:hover { background: #e8f5e9 !important; border-color: #a5d6a7 !important; }
    .tara-badge { background: #fffde7 !important; border-color: #ffe082 !important; }
    .tara-badge:hover { background: #fff9c4 !important; }
    .rm-ing-btn:hover { color: #e53935 !important; }
    .add-ing-btn:hover { background: #e8f5e9 !important; color: #2e7d32 !important; }
    .add-btn:hover { background: #388e3c !important; }
    .del-dish-btn:hover { background: #ffebee !important; color: #e53935 !important; }
    .edit-cost-btn:hover { background: #e8f5e9 !important; }
    .unit-chip:hover { background: #e8f5e9 !important; }
    .ing-row:hover { background: #f0faf0; }
    .close-btn:hover { color: #e53935 !important; }
    .day-dish-row { transition: all 0.15s; }
    .day-dish-row:hover { background: #f9fbe7 !important; }
    .clear-day-btn:hover { background: #ffebee !important; color: #e53935 !important; }
    .saved-date-btn:hover { background: #f1f8e9 !important; }
    input:focus, select:focus { outline: none; border-color: #4caf50 !important; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; display: inline-block; margin-left: 6px; transition: background 0.3s; }
    .sync-dot.ok { background: #4caf50; }
    .sync-dot.saving { background: #ffa726; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script>
  // ── Firebase init ──────────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBNnRqrkkBBq9VcplpavUK1V3MEbubRzi4",
    authDomain: "ecolavka-dc08f.firebaseapp.com",
    databaseURL: "https://ecolavka-dc08f-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ecolavka-dc08f",
    storageBucket: "ecolavka-dc08f.firebasestorage.app",
    messagingSenderId: "507953295640",
    appId: "1:507953295640:web:067e5c6a148db0166f2e6d"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  // ── localStorage helpers ───────────────────────────────────────────────────
  const ls = {
    get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
    set: (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    keys: (prefix) => { try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch { return []; } },
  };

  // ── Default data ───────────────────────────────────────────────────────────
  const DEF_ING = [
    { id:1,  name:"Шпинат",           unit:"кг", category:"Зелень",   costPer:1200 },
    { id:2,  name:"Нут",              unit:"кг", category:"Бобовые",  costPer:800  },
    { id:3,  name:"Авокадо",          unit:"шт", category:"Фрукты",   costPer:85   },
    { id:4,  name:"Киноа",            unit:"кг", category:"Крупы",    costPer:2100 },
    { id:5,  name:"Лимон",            unit:"шт", category:"Фрукты",   costPer:18   },
    { id:6,  name:"Оливковое масло",  unit:"л",  category:"Масла",    costPer:900  },
    { id:7,  name:"Помидоры черри",   unit:"кг", category:"Овощи",    costPer:1400 },
    { id:8,  name:"Огурец",           unit:"шт", category:"Овощи",    costPer:22   },
    { id:9,  name:"Семена чиа",       unit:"кг", category:"Семена",   costPer:3500 },
    { id:10, name:"Кокосовое молоко", unit:"л",  category:"Напитки",  costPer:600  },
    { id:11, name:"Банан",            unit:"шт", category:"Фрукты",   costPer:14   },
    { id:12, name:"Миндаль",          unit:"кг", category:"Орехи",    costPer:4200 },
    { id:13, name:"Тофу",             unit:"кг", category:"Белок",    costPer:1800 },
    { id:14, name:"Свёкла",           unit:"кг", category:"Овощи",    costPer:500  },
    { id:15, name:"Имбирь",           unit:"кг", category:"Специи",   costPer:2800 },
  ];
  const DEF_DISHES = [
    { id:1, name:"Боул с киноа",    emoji:"🥗", taraCost:0, ingredients:[{id:4,amount:0.1},{id:1,amount:0.05},{id:7,amount:0.08},{id:6,amount:0.02},{id:5,amount:0.5}] },
    { id:2, name:"Хумус с овощами", emoji:"🫘", taraCost:0, ingredients:[{id:2,amount:0.15},{id:6,amount:0.03},{id:5,amount:1},{id:8,amount:1},{id:7,amount:0.06}] },
    { id:3, name:"Авокадо тост",    emoji:"🥑", taraCost:0, ingredients:[{id:3,amount:1},{id:5,amount:0.5},{id:6,amount:0.01},{id:1,amount:0.02}] },
    { id:4, name:"Смузи чиа",       emoji:"🥤", taraCost:0, ingredients:[{id:9,amount:0.03},{id:10,amount:0.2},{id:11,amount:1},{id:12,amount:0.02}] },
    { id:5, name:"Тофу со свёклой", emoji:"🧆", taraCost:0, ingredients:[{id:13,amount:0.15},{id:14,amount:0.1},{id:15,amount:0.01},{id:6,amount:0.015}] },
  ];

  const catColors = {
    "Зелень":"#4ade80","Бобовые":"#fb923c","Фрукты":"#f472b6","Крупы":"#facc15",
    "Масла":"#a78bfa","Овощи":"#34d399","Семена":"#60a5fa","Напитки":"#38bdf8",
    "Орехи":"#d97706","Белок":"#e879f9","Специи":"#f87171",
  };
  const UNITS = ["кг","л","шт"];

  function calcCost(ings, allIngs, tara=0) {
    return ings.reduce((s,di) => {
      const ing = allIngs.find(i=>i.id===di.id);
      return ing?.costPer ? s + ing.costPer*di.amount : s;
    }, 0) + (tara||0);
  }

  function hl(text, q) {
    if (!q) return text;
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i===-1) return text;
    return <>{text.slice(0,i)}<mark style={{background:"#fff59d",borderRadius:3,padding:"0 1px"}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
  }

  // ── DishIngRow ─────────────────────────────────────────────────────────────
  function DishIngRow({di, allIngs, onChangeAmount, onRemove}) {
    const ing = allIngs.find(i=>i.id===di.id);
    const [ed,setEd]=useState(false); const [dr,setDr]=useState(""); const ref=useRef();
    useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
    if(!ing) return null;
    const lc=(ing.costPer||0)*di.amount;
    const commit=()=>{const v=parseFloat(dr);if(!isNaN(v)&&v>=0)onChangeAmount(di.id,v);setEd(false);};
    return (
      <div className="ing-dish-row" style={S.ingDishRow}>
        <span style={{width:8,height:8,borderRadius:"50%",background:catColors[ing.category]||"#aaa",flexShrink:0}}/>
        <span style={S.ingDishName}>{ing.name}</span>
        <div style={S.qtyCell}>
          {ed ? (
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input ref={ref} type="number" min="0" step="0.001" style={S.qtyInput} value={dr}
                onChange={e=>setDr(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
                onBlur={commit}/>
              <span style={S.qtyUnitInline}>{ing.unit}</span>
              <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commit();}}>✓</button>
            </div>
          ) : (
            <button className="qty-badge" style={S.qtyBadge} onClick={()=>{setDr(String(di.amount));setEd(true);}}>
              <span style={S.qtyNum}>{di.amount}</span>
              <span style={S.qtyUnitBadge}>{ing.unit}</span>
              <span style={S.editIcon}>✎</span>
            </button>
          )}
        </div>
        <span style={{...S.lineCost,color:lc>0?"#e65100":"#ccc"}}>{lc>0?`${lc.toFixed(2)} ₽`:"—"}</span>
        <button className="rm-ing-btn" style={S.rmIngBtn} onClick={()=>onRemove(di.id)}>✕</button>
      </div>
    );
  }

  // ── AddIngDropdown ─────────────────────────────────────────────────────────
  function AddIngDropdown({dishIngIds, allIngs, onAdd, onClose}) {
    const [sel,setSel]=useState(""); const [amt,setAmt]=useState("");
    const avail=allIngs.filter(i=>!dishIngIds.includes(i.id));
    const selIng=allIngs.find(i=>i.id===Number(sel));
    const ref=useRef();
    useEffect(()=>{
      const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
      document.addEventListener("mousedown",h); return()=>document.removeEventListener("mousedown",h);
    },[]);
    return (
      <div ref={ref} style={S.addIngDrop}>
        <div style={S.dropTitle}>Добавить ингредиент</div>
        <select style={S.dropSelect} value={sel} onChange={e=>setSel(e.target.value)}>
          <option value="">— выберите —</option>
          {avail.map(i=><option key={i.id} value={i.id}>{i.name} ({i.unit})</option>)}
        </select>
        {sel&&(
          <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
            <input autoFocus type="number" min="0" step="0.001" style={S.dropAmtInput}
              placeholder={`кол-во, ${selIng?.unit}`} value={amt} onChange={e=>setAmt(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&sel&&amt){onAdd(Number(sel),Number(amt));onClose();}}}/>
            <button style={{...S.dropAddBtn,opacity:sel&&amt?1:0.45}} disabled={!sel||!amt}
              onClick={()=>{onAdd(Number(sel),Number(amt));onClose();}}>Добавить</button>
          </div>
        )}
      </div>
    );
  }

  // ── DishCard ───────────────────────────────────────────────────────────────
  function DishCard({dish, allIngs, onUpdate, onDelete}) {
    const [exp,setExp]=useState(false); const [showDrop,setShowDrop]=useState(false);
    const [edTara,setEdTara]=useState(false); const [taraDr,setTaraDr]=useState(""); const taraRef=useRef();
    useEffect(()=>{if(edTara&&taraRef.current)taraRef.current.focus();},[edTara]);
    const cost=calcCost(dish.ingredients,allIngs,dish.taraCost);
    const commitTara=()=>{const v=parseFloat(taraDr);onUpdate(dish.id,{taraCost:isNaN(v)?0:v});setEdTara(false);};
    return (
      <div style={{...S.dishCard,borderColor:exp?"#a5d6a7":"#e8f5e9"}}>
        <div className="dish-top" style={S.dishTop} onClick={()=>setExp(v=>!v)}>
          <div style={S.dishTopLeft}>
            <span style={{fontSize:36}}>{dish.emoji}</span>
            <div>
              <div style={S.dishName}>{dish.name}</div>
              {cost>0&&<div style={{marginTop:4,fontSize:13,color:"#e65100",fontWeight:600}}>с/с {cost.toFixed(2)} ₽</div>}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={S.ingCountBadge}>{dish.ingredients.length} ингр.</span>
            <span style={{fontSize:16,color:"#a5d6a7",display:"inline-block",transform:exp?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
          </div>
        </div>
        {exp&&(
          <div style={S.dishBody}>
            <div style={S.ingTableHead}>
              <span style={{flex:1}}>Ингредиент</span>
              <span style={{width:148,textAlign:"center"}}>Количество</span>
              <span style={{width:76,textAlign:"right"}}>С/С</span>
              <span style={{width:28}}/>
            </div>
            {dish.ingredients.length===0&&<div style={{padding:"14px 0",textAlign:"center",fontSize:13,color:"#bdbdbd"}}>Нет ингредиентов</div>}
            {dish.ingredients.map(di=>(
              <DishIngRow key={di.id} di={di} allIngs={allIngs}
                onChangeAmount={(id,v)=>onUpdate(dish.id,{ingredients:dish.ingredients.map(d=>d.id===id?{...d,amount:Number(v)}:d)})}
                onRemove={id=>onUpdate(dish.id,{ingredients:dish.ingredients.filter(d=>d.id!==id)})}/>
            ))}
            <div style={S.taraRow}>
              <span style={S.taraIcon}>📦</span>
              <span style={S.taraLabel}>Тара</span>
              <div style={S.taraQtyCell}>
                {edTara?(
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input ref={taraRef} type="number" min="0" step="0.01" style={S.qtyInput} value={taraDr} placeholder="0"
                      onChange={e=>setTaraDr(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")commitTara();if(e.key==="Escape")setEdTara(false);}}
                      onBlur={commitTara}/>
                    <span style={S.qtyUnitInline}>₽</span>
                    <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commitTara();}}>✓</button>
                  </div>
                ):(
                  <button className="qty-badge tara-badge" style={S.qtyBadge}
                    onClick={()=>{setTaraDr(String(dish.taraCost||""));setEdTara(true);}}>
                    <span style={S.qtyNum}>{dish.taraCost>0?dish.taraCost:"—"}</span>
                    {dish.taraCost>0&&<span style={S.qtyUnitBadge}>₽</span>}
                    <span style={S.editIcon}>✎</span>
                  </button>
                )}
              </div>
              <span style={{...S.lineCost,color:dish.taraCost>0?"#e65100":"#ccc"}}>{dish.taraCost>0?`${Number(dish.taraCost).toFixed(2)} ₽`:"—"}</span>
              <span style={{width:28}}/>
            </div>
            <div style={S.dishFooter}>
              <div style={{position:"relative"}}>
                <button className="add-ing-btn" style={S.addIngBtn} onClick={e=>{e.stopPropagation();setShowDrop(v=>!v);}}>+ Ингредиент</button>
                {showDrop&&<AddIngDropdown dishIngIds={dish.ingredients.map(d=>d.id)} allIngs={allIngs}
                  onAdd={(id,amt)=>onUpdate(dish.id,{ingredients:[...dish.ingredients,{id,amount:amt}]})}
                  onClose={()=>setShowDrop(false)}/>}
              </div>
              {cost>0&&<div style={S.costSummary}><span style={{fontSize:12,color:"#9e9e9e"}}>Итого с/с:</span><span style={{fontSize:14,color:"#e65100",fontWeight:700}}>{cost.toFixed(2)} ₽</span></div>}
              <button className="del-dish-btn" style={S.delDishBtn} onClick={()=>onDelete(dish.id)}>🗑</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── DayTableRow ────────────────────────────────────────────────────────────
  function DayTableRow({dish, portions, dishCost, rowTotal, readOnly, chefDone, onChangePortions}) {
    const [ed,setEd]=useState(false); const [dr,setDr]=useState(""); const ref=useRef();
    useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
    const commit=()=>{onChangePortions(Math.max(0,parseInt(dr)||0));setEd(false);};
    const active=portions>0;
    return (
      <div className="day-dish-row" style={{...S.dayDishRow,background:active?"#fafff8":"#fff",borderColor:active?"#c8e6c9":"#f0f0f0",opacity:chefDone?0.5:1}}>
        <span style={{fontSize:26,flexShrink:0,opacity:active?1:0.4}}>{dish.emoji}</span>
        <div style={{flex:1,minWidth:0}}>
          <span style={{...S.dayDishName,opacity:active?1:0.55}}>{dish.name}</span>
          {chefDone&&<span style={{marginLeft:8,fontSize:11,color:"#4caf50",fontWeight:600}}>✓ Готово</span>}
        </div>
        <span style={{width:90,textAlign:"center",fontSize:12,color:dishCost>0?"#e65100":"#ccc",fontWeight:500}}>{dishCost>0?`${dishCost.toFixed(2)} ₽`:"—"}</span>
        <div style={{width:130,display:"flex",justifyContent:"center"}}>
          {ed&&!readOnly?(
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input ref={ref} type="number" min="0" step="1" style={{...S.qtyInput,width:56}} value={dr}
                onChange={e=>setDr(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
                onBlur={commit}/>
              <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commit();}}>✓</button>
            </div>
          ):(
            <button className={readOnly?"":"qty-badge"} style={{...S.qtyBadge,minWidth:64,cursor:readOnly?"default":"pointer",background:active?"#e8f5e9":"#f5f5f5",borderColor:active?"#a5d6a7":"#e0e0e0"}}
              onClick={readOnly?undefined:()=>{setDr(String(portions));setEd(true);}}>
              <span style={{...S.qtyNum,color:active?"#2e7d32":"#999"}}>{portions}</span>
              <span style={{fontSize:10,color:active?"#81c784":"#bbb"}}>порц.</span>
              {!readOnly&&<span style={S.editIcon}>✎</span>}
            </button>
          )}
        </div>
        <span style={{width:100,textAlign:"right",fontSize:13,fontWeight:rowTotal>0?700:400,color:rowTotal>0?"#e65100":"#ccc"}}>{rowTotal>0?`${rowTotal.toFixed(2)} ₽`:"—"}</span>
      </div>
    );
  }

  // ── Main App ───────────────────────────────────────────────────────────────
  function App() {
    const [tab,setTab]=useState("dishes");
    const [dishes,setDishes]=useState(()=>ls.get("eco_dishes",DEF_DISHES));
    const [ingredients,setIngredients]=useState(()=>ls.get("eco_ingredients",DEF_ING));
    const [showAddDish,setShowAddDish]=useState(false);
    const [showAddIngredient,setShowAddIngredient]=useState(false);
    const [editIng,setEditIng]=useState(null);
    const [editIngUnit,setEditIngUnit]=useState(null);
    const [newDish,setNewDish]=useState({name:"",emoji:"🍽️"});
    const [newIng,setNewIng]=useState({name:"",unit:"кг",category:"Овощи",costPer:""});
    const [dishSearch,setDishSearch]=useState("");
    const [ingSearch,setIngSearch]=useState("");
    const [dayPortions,setDayPortions]=useState({});
    const [chefDone,setChefDone]=useState({});
    const [menuDate,setMenuDate]=useState(()=>new Date().toISOString().slice(0,10));
    const [savedDates,setSavedDates]=useState([]);
    const [syncStatus,setSyncStatus]=useState("ok"); // ok | saving
    const today=new Date().toISOString().slice(0,10);
    const isReadOnly=menuDate<today;

    // ── Sync dishes & ingredients to Firebase ─────────────────────────────
    useEffect(()=>{
      ls.set("eco_dishes",dishes);
      db.ref("dishes").set(dishes).catch(()=>{});
    },[dishes]);

    useEffect(()=>{
      ls.set("eco_ingredients",ingredients);
      db.ref("ingredients").set(ingredients).catch(()=>{});
    },[ingredients]);

    // ── Load saved dates from Firebase ────────────────────────────────────
    useEffect(()=>{
      db.ref("daymenu").on("value",snap=>{
        const data=snap.val();
        if(data){
          const dates=Object.keys(data).sort().reverse();
          setSavedDates(dates);
        } else {
          setSavedDates([]);
        }
      });
    },[]);

    // ── Load day portions + chef done from Firebase when date changes ─────
    useEffect(()=>{
      const ref=db.ref(`daymenu/${menuDate}`);
      ref.on("value",snap=>{
        const data=snap.val()||{};
        setDayPortions(data.portions||{});
        setChefDone(data.done||{});
      });
      return()=>ref.off();
    },[menuDate]);

    // ── Save portions to Firebase ─────────────────────────────────────────
    const savePortions=useCallback(async(portions)=>{
      setSyncStatus("saving");
      try {
        await db.ref(`daymenu/${menuDate}/portions`).set(portions);
        setSyncStatus("ok");
      } catch(e){ setSyncStatus("ok"); }
    },[menuDate]);

    const setPortions=(dishId,val)=>{
      if(isReadOnly)return;
      const n=Math.max(0,parseInt(val)||0);
      setDayPortions(p=>{
        const next={...p,[dishId]:n};
        savePortions(next);
        return next;
      });
    };

    const clearDayMenu=()=>{
      if(isReadOnly)return;
      setDayPortions({});
      db.ref(`daymenu/${menuDate}/portions`).set({}).catch(()=>{});
    };

    // ── Dish & ingredient helpers ─────────────────────────────────────────
    const updateDish=(id,patch)=>setDishes(p=>p.map(d=>d.id===id?{...d,...patch}:d));
    const deleteDish=(id)=>setDishes(p=>p.filter(d=>d.id!==id));
    const removeIng=(id)=>setIngredients(ingredients.filter(i=>i.id!==id));

    const addDish=()=>{
      if(!newDish.name)return;
      setDishes([...dishes,{...newDish,id:Date.now(),taraCost:0,ingredients:[]}]);
      setNewDish({name:"",emoji:"🍽️"}); setShowAddDish(false);
    };

    const addIng=()=>{
      if(!newIng.name)return;
      setIngredients([...ingredients,{...newIng,id:Date.now(),costPer:Number(newIng.costPer)||0}]);
      setNewIng({name:"",unit:"кг",category:"Овощи",costPer:""}); setShowAddIngredient(false);
    };

    const saveIngCost=(id,c)=>{setIngredients(p=>p.map(i=>i.id===id?{...i,costPer:Number(c)}:i));setEditIng(null);};
    const saveIngUnit=(id,u)=>{setIngredients(p=>p.map(i=>i.id===id?{...i,unit:u}:i));setEditIngUnit(null);};

    // ── Computed ──────────────────────────────────────────────────────────
    const activeDay=dishes.map(d=>({dish:d,portions:dayPortions[d.id]||0})).filter(x=>x.portions>0);
    const dayTotal=activeDay.reduce((s,{dish,portions})=>s+calcCost(dish.ingredients,ingredients,dish.taraCost)*portions,0);
    const dayPortionsTotal=activeDay.reduce((s,x)=>s+x.portions,0);
    const doneCount=activeDay.filter(({dish})=>chefDone[dish.id]).length;

    const dayIngTotals=()=>{
      const t={};
      activeDay.forEach(({dish,portions})=>{dish.ingredients.forEach(({id,amount})=>{t[id]=(t[id]||0)+amount*portions;});});
      return Object.entries(t).map(([id,total])=>({ing:ingredients.find(i=>i.id===Number(id)),total})).filter(x=>x.ing);
    };

    const filtDishes=dishes.filter(d=>d.name.toLowerCase().includes(dishSearch.toLowerCase()));
    const filtIngs=ingredients.filter(i=>i.name.toLowerCase().includes(ingSearch.toLowerCase()));
    const visCats=[...new Set(filtIngs.map(i=>i.category))];

    return (
      <div style={S.root}>
        <header style={S.header}>
          <div style={S.logo}>
            <span style={{fontSize:32}}>🌿</span>
            <div>
              <div style={S.logoTitle}>Эколавка <span className="sync-dot" style={{width:8,height:8,borderRadius:"50%",display:"inline-block",background:syncStatus==="saving"?"#ffa726":"#4caf50"}}/></div>
              <div style={S.logoSub}>Администратор</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {[{key:"dishes",label:"🍽️ Блюда"},{key:"ingredients",label:"🥬 Ингред."},{key:"daymenu",label:"📋 Меню"}].map(({key,label})=>(
              <button key={key} className="tab-btn" onClick={()=>setTab(key)} style={{...S.tabBtn,...(tab===key?S.tabActive:{})}}>{label}</button>
            ))}
          </div>
        </header>

        <main style={S.main}>

          {/* DISHES */}
          {tab==="dishes"&&(
            <>
              <div style={S.secHead}>
                <div><div style={S.secTitle}>Блюда</div><div style={S.secHint}>Раскройте для редактирования</div></div>
                <button className="add-btn" style={S.addBtn} onClick={()=>setShowAddDish(true)}>+ Добавить</button>
              </div>
              <div style={S.searchWrap}>
                <span>🔍</span>
                <input style={S.searchInput} placeholder="Найти блюдо..." value={dishSearch} onChange={e=>setDishSearch(e.target.value)}/>
                {dishSearch&&<button style={S.searchClear} onClick={()=>setDishSearch("")}>✕</button>}
              </div>
              {filtDishes.length===0?<div style={S.emptySearch}>Не найдено</div>:(
                <div style={S.dishList}>
                  {filtDishes.map(dish=><DishCard key={dish.id} dish={dish} allIngs={ingredients} onUpdate={updateDish} onDelete={deleteDish}/>)}
                </div>
              )}
            </>
          )}

          {/* INGREDIENTS */}
          {tab==="ingredients"&&(
            <>
              <div style={S.secHead}>
                <div><div style={S.secTitle}>Ингредиенты</div><div style={S.secHint}>{ingredients.length} позиций</div></div>
                <button className="add-btn" style={S.addBtn} onClick={()=>setShowAddIngredient(true)}>+ Добавить</button>
              </div>
              <div style={S.searchWrap}>
                <span>🔍</span>
                <input style={S.searchInput} placeholder="Найти..." value={ingSearch} onChange={e=>setIngSearch(e.target.value)}/>
                {ingSearch&&<button style={S.searchClear} onClick={()=>setIngSearch("")}>✕</button>}
              </div>
              {filtIngs.length===0?<div style={S.emptySearch}>Не найдено</div>:visCats.map(cat=>(
                <div key={cat} style={{marginBottom:20}}>
                  <div style={S.catTitle}>
                    <span style={{width:10,height:10,borderRadius:"50%",background:catColors[cat]||"#aaa",display:"inline-block"}}/>
                    {cat}
                  </div>
                  {filtIngs.filter(i=>i.category===cat).map(ing=>(
                    <div key={ing.id} className="ing-row" style={S.ingRow}>
                      <span style={S.ingName}>{ingSearch?hl(ing.name,ingSearch):ing.name}</span>
                      {editIngUnit?.id===ing.id?(
                        <div style={{display:"flex",gap:4}}>
                          {UNITS.map(u=><button key={u} style={{...S.unitOption,background:editIngUnit.unit===u?"#4caf50":"#f1f8e9",color:editIngUnit.unit===u?"#fff":"#4caf50",border:`1.5px solid ${editIngUnit.unit===u?"#4caf50":"#c8e6c9"}`}} onClick={()=>saveIngUnit(ing.id,u)}>{u}</button>)}
                          <button style={S.cancelSmBtn} onClick={()=>setEditIngUnit(null)}>✕</button>
                        </div>
                      ):(
                        <button className="unit-chip" style={S.unitChip} onClick={()=>setEditIngUnit({id:ing.id,unit:ing.unit})}>{ing.unit} ✎</button>
                      )}
                      {editIng?.id===ing.id?(
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <input autoFocus type="number" step="0.01" style={S.inlineInput} value={editIng.costPer}
                            onChange={e=>setEditIng({...editIng,costPer:e.target.value})}
                            onKeyDown={e=>{if(e.key==="Enter")saveIngCost(ing.id,editIng.costPer);if(e.key==="Escape")setEditIng(null);}}/>
                          <span style={{fontSize:11,color:"#9e9e9e"}}>₽/{ing.unit}</span>
                          <button style={S.saveBtn} onClick={()=>saveIngCost(ing.id,editIng.costPer)}>✓</button>
                          <button style={S.cancelSmBtn} onClick={()=>setEditIng(null)}>✕</button>
                        </div>
                      ):(
                        <button className="edit-cost-btn" style={S.costChip} onClick={()=>setEditIng({id:ing.id,costPer:ing.costPer??""})}>
                          💰 {ing.costPer?`${ing.costPer} ₽/${ing.unit}`:"—"}
                        </button>
                      )}
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:(catColors[ing.category]||"#aaa")+"22",color:catColors[ing.category]||"#555",fontWeight:500}}>{ing.category}</span>
                      <button className="close-btn" style={S.removeBtn} onClick={()=>removeIng(ing.id)}>✕</button>
                    </div>
                  ))}
                </div>
              ))}
            </>
          )}

          {/* DAY MENU */}
          {tab==="daymenu"&&(
            <>
              <div style={S.secHead}>
                <div>
                  <div style={S.secTitle}>📋 Меню на день</div>
                  <div style={S.secHint}>{isReadOnly?"🔒 Только просмотр":"Повар видит изменения автоматически"}</div>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="date" style={{...S.input,width:"auto",marginBottom:0,padding:"7px 10px",fontSize:13}} value={menuDate} onChange={e=>setMenuDate(e.target.value)}/>
                  {!isReadOnly&&dayPortionsTotal>0&&<button className="clear-day-btn" style={S.clearDayBtn} onClick={clearDayMenu}>Сбросить</button>}
                </div>
              </div>

              {/* Chef progress */}
              {dayPortionsTotal>0&&(
                <div style={{background:"#e8f5e9",borderRadius:14,padding:"12px 18px",marginBottom:14,border:"2px solid #a5d6a7",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:12,fontWeight:700,color:"#2e7d32"}}>👨‍🍳 Прогресс повара</div>
                    <div style={{fontSize:12,color:"#4caf50",marginTop:2}}>{doneCount} из {activeDay.length} блюд готово</div>
                  </div>
                  <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:20,fontWeight:900,color:doneCount===activeDay.length?"#2e7d32":"#81c784"}}>
                    {activeDay.length>0?Math.round(doneCount/activeDay.length*100):0}%
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{...S.dateBanner,borderColor:isReadOnly?"#ffe082":"#e8f5e9",background:isReadOnly?"#fffde7":"#fff"}}>
                    <span style={S.dateBannerText}>{new Date(menuDate+"T00:00:00").toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}</span>
                    {dayPortionsTotal>0&&<span style={{fontSize:12,color:"#81c784"}}>{dayPortionsTotal} порц. · {dayTotal.toFixed(0)} ₽</span>}
                  </div>
                  <div style={S.dayTableHead}>
                    <span style={{flex:1}}>Блюдо</span>
                    <span style={{width:90,textAlign:"center"}}>С/С</span>
                    <span style={{width:130,textAlign:"center"}}>Порций</span>
                    <span style={{width:100,textAlign:"right"}}>Итого</span>
                  </div>
                  <div style={{marginBottom:16}}>
                    {dishes.map(dish=>{
                      const portions=dayPortions[dish.id]||0;
                      const dc=calcCost(dish.ingredients,ingredients,dish.taraCost);
                      return <DayTableRow key={dish.id} dish={dish} portions={portions} dishCost={dc} rowTotal={dc*portions} readOnly={isReadOnly} chefDone={!!chefDone[dish.id]} onChangePortions={v=>setPortions(dish.id,v)}/>;
                    })}
                  </div>
                  <div style={S.daySummaryCard}>
                    <div style={S.daySummaryRow}><span style={S.daySummaryLabel}>Итого порций:</span><span style={S.daySummaryValue}>{dayPortionsTotal}</span></div>
                    <div style={{...S.daySummaryRow,marginBottom:0}}><span style={S.daySummaryLabel}>Себестоимость:</span><span style={{...S.daySummaryValue,color:"#e65100",fontSize:16}}>{dayTotal.toFixed(2)} ₽</span></div>
                  </div>
                  {dayPortionsTotal>0&&(
                    <div style={{marginTop:16}}>
                      <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:13,fontWeight:700,color:"#1b5e20",marginBottom:10}}>🧺 Сводная закупка</div>
                      <div style={S.dayIngGrid}>
                        {dayIngTotals().map(({ing,total})=>(
                          <div key={ing.id} style={S.dayIngChip}>
                            <span style={{width:8,height:8,borderRadius:"50%",background:catColors[ing.category]||"#aaa",flexShrink:0}}/>
                            <span style={S.dayIngName}>{ing.name}</span>
                            <span style={S.dayIngAmt}>{total%1===0?total:total.toFixed(3)} {ing.unit}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
                {savedDates.length>0&&(
                  <div style={S.savedSidebar}>
                    <div style={S.savedSidebarTitle}>📅 История</div>
                    {savedDates.map(d=>(
                      <button key={d} className="saved-date-btn" style={{...S.savedDateBtn,background:d===menuDate?"#e8f5e9":"#fff",borderColor:d===menuDate?"#a5d6a7":"#e8f5e9",color:d===menuDate?"#2e7d32":"#555",fontWeight:d===menuDate?700:400}} onClick={()=>setMenuDate(d)}>
                        <span style={{fontSize:11}}>{new Date(d+"T00:00:00").toLocaleDateString("ru-RU",{day:"numeric",month:"short"})}</span>
                        {d<today?<span>🔒</span>:<span style={{fontSize:9,color:"#4caf50"}}>сег.</span>}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}
        </main>

        {/* MODALS */}
        {showAddDish&&(
          <div style={S.overlay} onClick={()=>setShowAddDish(false)}>
            <div style={S.modal} onClick={e=>e.stopPropagation()}>
              <div style={S.modalTitle}>➕ Новое блюдо</div>
              <input style={S.input} placeholder="Название" value={newDish.name} onChange={e=>setNewDish({...newDish,name:e.target.value})}/>
              <input style={S.input} placeholder="Эмодзи (🍽️)" value={newDish.emoji} onChange={e=>setNewDish({...newDish,emoji:e.target.value})}/>
              <div style={{fontSize:12,color:"#81c784",marginBottom:14}}>Ингредиенты добавляйте после создания</div>
              <div style={S.modalActions}>
                <button style={S.cancelBtn} onClick={()=>setShowAddDish(false)}>Отмена</button>
                <button className="add-btn" style={S.addBtn} onClick={addDish}>Создать</button>
              </div>
            </div>
          </div>
        )}
        {showAddIngredient&&(
          <div style={S.overlay} onClick={()=>setShowAddIngredient(false)}>
            <div style={S.modal} onClick={e=>e.stopPropagation()}>
              <div style={S.modalTitle}>🥬 Новый ингредиент</div>
              <input style={S.input} placeholder="Название" value={newIng.name} onChange={e=>setNewIng({...newIng,name:e.target.value})}/>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:"#81c784",marginBottom:6}}>Единица измерения</div>
                <div style={{display:"flex",gap:6}}>
                  {UNITS.map(u=><button key={u} style={{...S.unitOption,flex:1,padding:"8px 0",background:newIng.unit===u?"#4caf50":"#f1f8e9",color:newIng.unit===u?"#fff":"#4caf50",border:`1.5px solid ${newIng.unit===u?"#4caf50":"#c8e6c9"}`}} onClick={()=>setNewIng({...newIng,unit:u})}>{u}</button>)}
                </div>
              </div>
              <select style={S.input} value={newIng.category} onChange={e=>setNewIng({...newIng,category:e.target.value})}>
                {Object.keys(catColors).map(c=><option key={c}>{c}</option>)}
              </select>
              <input style={S.input} type="number" step="0.01" placeholder={`Себестоимость (₽/${newIng.unit})`} value={newIng.costPer} onChange={e=>setNewIng({...newIng,costPer:e.target.value})}/>
              <div style={S.modalActions}>
                <button style={S.cancelBtn} onClick={()=>setShowAddIngredient(false)}>Отмена</button>
                <button className="add-btn" style={S.addBtn} onClick={addIng}>Добавить</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const S = {
    root:{minHeight:"100vh",fontFamily:"'Geologica',sans-serif"},
    header:{background:"#fff",borderBottom:"2px solid #e8f5e9",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 12px rgba(76,153,80,0.08)",position:"sticky",top:0,zIndex:100},
    logo:{display:"flex",alignItems:"center",gap:10},
    logoTitle:{fontFamily:"'Unbounded',sans-serif",fontWeight:800,fontSize:18,color:"#2e7d32"},
    logoSub:{fontSize:11,color:"#81c784",fontWeight:300},
    tabBtn:{padding:"7px 14px",borderRadius:20,border:"2px solid #e8f5e9",background:"#fff",color:"#555",fontFamily:"'Geologica',sans-serif",fontSize:12,fontWeight:500,cursor:"pointer"},
    tabActive:{background:"#2e7d32",color:"#fff",borderColor:"#2e7d32"},
    main:{maxWidth:860,margin:"0 auto",padding:"20px 16px"},
    secHead:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14},
    secTitle:{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:18,color:"#1b5e20"},
    secHint:{fontSize:12,color:"#81c784",marginTop:3},
    addBtn:{padding:"9px 18px",background:"#4caf50",color:"#fff",border:"none",borderRadius:20,fontFamily:"'Geologica',sans-serif",fontSize:13,fontWeight:500,cursor:"pointer"},
    searchWrap:{display:"flex",alignItems:"center",gap:8,background:"#fff",border:"1.5px solid #e8f5e9",borderRadius:12,padding:"8px 12px",marginBottom:14},
    searchInput:{flex:1,border:"none",background:"none",fontSize:14,fontFamily:"'Geologica',sans-serif",color:"#2d4a2e",outline:"none"},
    searchClear:{background:"none",border:"none",color:"#bdbdbd",cursor:"pointer",fontSize:14},
    emptySearch:{textAlign:"center",padding:"40px 0",fontSize:14,color:"#bdbdbd",fontStyle:"italic"},
    dishList:{display:"flex",flexDirection:"column",gap:10},
    dishCard:{background:"#fff",borderRadius:16,border:"2px solid #e8f5e9",overflow:"visible",transition:"border-color 0.2s"},
    dishTop:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px"},
    dishTopLeft:{display:"flex",alignItems:"center",gap:12},
    dishName:{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:13,color:"#1b5e20"},
    ingCountBadge:{fontSize:10,color:"#a5d6a7",background:"#f1f8e9",padding:"2px 8px",borderRadius:10},
    dishBody:{borderTop:"1.5px solid #f1f8e9",padding:"0 18px 14px"},
    ingTableHead:{display:"flex",alignItems:"center",padding:"8px 0 5px",fontSize:9,color:"#bdbdbd",textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:600,borderBottom:"1px solid #f5f5f5"},
    ingDishRow:{display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:"1px solid #fafafa"},
    ingDishName:{flex:1,fontSize:13,color:"#2d4a2e",fontWeight:500},
    qtyCell:{width:148,display:"flex",justifyContent:"center"},
    qtyBadge:{display:"flex",alignItems:"center",gap:4,padding:"4px 9px",borderRadius:18,border:"1.5px solid #e8f5e9",background:"#fafff8",cursor:"pointer",fontFamily:"'Geologica',sans-serif"},
    qtyNum:{fontSize:13,fontWeight:600,color:"#2d4a2e"},
    qtyUnitBadge:{fontSize:10,color:"#81c784",fontWeight:500},
    qtyUnitInline:{fontSize:11,color:"#9e9e9e"},
    editIcon:{fontSize:10,color:"#c8e6c9",opacity:0.7},
    qtyInput:{width:72,padding:"4px 7px",borderRadius:8,border:"1.5px solid #4caf50",fontSize:13,fontFamily:"'Geologica',sans-serif",background:"#fff",color:"#2d4a2e",textAlign:"right"},
    okBtn:{padding:"3px 7px",background:"#4caf50",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:12},
    lineCost:{width:76,textAlign:"right",fontSize:12,fontWeight:500},
    rmIngBtn:{width:26,height:26,border:"none",background:"none",color:"#d0d0d0",cursor:"pointer",fontSize:13,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"},
    taraRow:{display:"flex",alignItems:"center",gap:8,padding:"7px 4px",borderBottom:"1px solid #fafafa",background:"#fffef5",borderRadius:8,marginTop:2},
    taraIcon:{fontSize:14,flexShrink:0},
    taraLabel:{flex:1,fontSize:13,color:"#7b6a00",fontWeight:600},
    taraQtyCell:{width:148,display:"flex",justifyContent:"center"},
    dishFooter:{display:"flex",alignItems:"center",gap:10,marginTop:10},
    addIngBtn:{padding:"5px 12px",background:"#f1f8e9",border:"1.5px solid #c8e6c9",borderRadius:18,fontSize:12,color:"#4caf50",cursor:"pointer",fontFamily:"'Geologica',sans-serif",fontWeight:500},
    costSummary:{flex:1,display:"flex",gap:8,alignItems:"center",justifyContent:"flex-end"},
    delDishBtn:{width:30,height:30,border:"none",background:"#f5f5f5",color:"#bdbdbd",cursor:"pointer",fontSize:14,borderRadius:8},
    addIngDrop:{position:"absolute",bottom:"calc(100% + 6px)",left:0,background:"#fff",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.13)",border:"1.5px solid #e8f5e9",padding:"12px 14px",minWidth:240,zIndex:200},
    dropTitle:{fontSize:10,color:"#81c784",fontWeight:600,marginBottom:7,textTransform:"uppercase",letterSpacing:"0.4px"},
    dropSelect:{width:"100%",padding:"7px 9px",borderRadius:9,border:"1.5px solid #e8f5e9",fontSize:13,fontFamily:"'Geologica',sans-serif",background:"#fafafa",color:"#2d4a2e"},
    dropAmtInput:{flex:1,padding:"6px 9px",borderRadius:9,border:"1.5px solid #e8f5e9",fontSize:13,fontFamily:"'Geologica',sans-serif",background:"#fafafa",color:"#2d4a2e"},
    dropAddBtn:{padding:"6px 12px",background:"#4caf50",color:"#fff",border:"none",borderRadius:9,fontSize:13,cursor:"pointer",fontFamily:"'Geologica',sans-serif",fontWeight:500},
    catTitle:{display:"flex",alignItems:"center",gap:7,fontFamily:"'Unbounded',sans-serif",fontSize:12,fontWeight:600,color:"#388e3c",marginBottom:7},
    ingRow:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#fff",borderRadius:11,marginBottom:5,border:"1.5px solid #e8f5e9",transition:"background 0.15s"},
    ingName:{flex:1,fontSize:13,color:"#2d4a2e",fontWeight:500},
    unitChip:{display:"flex",alignItems:"center",gap:3,padding:"3px 9px",borderRadius:18,background:"#f1f8e9",border:"1.5px solid #c8e6c9",fontSize:11,color:"#4caf50",cursor:"pointer",fontFamily:"'Geologica',sans-serif",fontWeight:600,transition:"all 0.12s"},
    unitOption:{padding:"3px 10px",borderRadius:18,fontSize:11,cursor:"pointer",fontFamily:"'Geologica',sans-serif",fontWeight:600},
    costChip:{display:"flex",alignItems:"center",gap:3,padding:"3px 9px",borderRadius:18,background:"#f9fbe7",border:"1px solid #dcedc8",fontSize:11,color:"#558b2f",cursor:"pointer",fontFamily:"'Geologica',sans-serif",whiteSpace:"nowrap",transition:"background 0.12s"},
    inlineInput:{width:74,padding:"3px 7px",borderRadius:7,border:"1.5px solid #4caf50",fontSize:12,fontFamily:"'Geologica',sans-serif",background:"#fff",color:"#2d4a2e"},
    saveBtn:{padding:"3px 7px",background:"#4caf50",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:12},
    cancelSmBtn:{padding:"3px 7px",background:"#f5f5f5",color:"#777",border:"none",borderRadius:7,cursor:"pointer",fontSize:12},
