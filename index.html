    input:focus,select:focus{outline:none;border-color:#4caf50!important;}
    input[type=number]::-webkit-inner-spin-button{opacity:0.4;}
    #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
    .spin{width:40px;height:40px;border:4px solid #e8f5e9;border-top-color:#4caf50;border-radius:50%;animation:spin 0.8s linear infinite;}

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const db = window.db;

// ── localStorage ──────────────────────────────────────────────────────────────
const ls = {
  get:(k,def)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  keys:(p)=>{try{return Object.keys(localStorage).filter(k=>k.startsWith(p));}catch{return[];}},
};

// ── Data ──────────────────────────────────────────────────────────────────────
const DEF_ING=[
  {id:1,name:"Шпинат",unit:"кг",category:"Зелень",costPer:1200},
  {id:2,name:"Нут",unit:"кг",category:"Бобовые",costPer:800},
  {id:3,name:"Авокадо",unit:"шт",category:"Фрукты",costPer:85},
  {id:4,name:"Киноа",unit:"кг",category:"Крупы",costPer:2100},
  {id:5,name:"Лимон",unit:"шт",category:"Фрукты",costPer:18},
  {id:6,name:"Оливковое масло",unit:"л",category:"Масла",costPer:900},
  {id:7,name:"Помидоры черри",unit:"кг",category:"Овощи",costPer:1400},
  {id:8,name:"Огурец",unit:"шт",category:"Овощи",costPer:22},
  {id:9,name:"Семена чиа",unit:"кг",category:"Семена",costPer:3500},
  {id:10,name:"Кокосовое молоко",unit:"л",category:"Напитки",costPer:600},
  {id:11,name:"Банан",unit:"шт",category:"Фрукты",costPer:14},
  {id:12,name:"Миндаль",unit:"кг",category:"Орехи",costPer:4200},
  {id:13,name:"Тофу",unit:"кг",category:"Белок",costPer:1800},
  {id:14,name:"Свёкла",unit:"кг",category:"Овощи",costPer:500},
  {id:15,name:"Имбирь",unit:"кг",category:"Специи",costPer:2800},
];
const DEF_DISHES=[
  {id:1,name:"Боул с киноа",emoji:"🥗",taraCost:0,ingredients:[{id:4,amount:0.1},{id:1,amount:0.05},{id:7,amount:0.08},{id:6,amount:0.02},{id:5,amount:0.5}]},
  {id:2,name:"Хумус с овощами",emoji:"🫘",taraCost:0,ingredients:[{id:2,amount:0.15},{id:6,amount:0.03},{id:5,amount:1},{id:8,amount:1},{id:7,amount:0.06}]},
  {id:3,name:"Авокадо тост",emoji:"🥑",taraCost:0,ingredients:[{id:3,amount:1},{id:5,amount:0.5},{id:6,amount:0.01},{id:1,amount:0.02}]},
  {id:4,name:"Смузи чиа",emoji:"🥤",taraCost:0,ingredients:[{id:9,amount:0.03},{id:10,amount:0.2},{id:11,amount:1},{id:12,amount:0.02}]},
  {id:5,name:"Тофу со свёклой",emoji:"🧆",taraCost:0,ingredients:[{id:13,amount:0.15},{id:14,amount:0.1},{id:15,amount:0.01},{id:6,amount:0.015}]},
];
const DEF_COOKS=[
  {id:1,name:"Повар 1",salary:2000},
  {id:2,name:"Повар 2",salary:2000},
  {id:3,name:"Повар 3",salary:2000},
  {id:4,name:"Повар 4",salary:2000},
  {id:5,name:"Повар 5",salary:2000},
];
const catColors={
  "Зелень":"#4ade80","Бобовые":"#fb923c","Фрукты":"#f472b6","Крупы":"#facc15",
  "Масла":"#a78bfa","Овощи":"#34d399","Семена":"#60a5fa","Напитки":"#38bdf8",
  "Орехи":"#d97706","Белок":"#e879f9","Специи":"#f87171",
};
const UNITS=["кг","л","шт"];

function calcCost(ings,allIngs,tara=0){
  return ings.reduce((s,di)=>{const i=allIngs.find(x=>x.id===di.id);return i?.costPer?s+i.costPer*di.amount:s;},0)+(tara||0);
}
function hl(text,q){
  if(!q)return text;const i=text.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return text;
  return <>{text.slice(0,i)}<mark style={{background:"#fff59d",borderRadius:3,padding:"0 1px"}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
}

// ── DishIngRow ────────────────────────────────────────────────────────────────
function DishIngRow({di,allIngs,onChangeAmount,onRemove}){
  const ing=allIngs.find(i=>i.id===di.id);
  const [ed,setEd]=useState(false);const [dr,setDr]=useState("");const ref=useRef();
  useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
  if(!ing)return null;
  const lc=(ing.costPer||0)*di.amount;
  const commit=()=>{const v=parseFloat(dr);if(!isNaN(v)&&v>=0)onChangeAmount(di.id,v);setEd(false);};
  return(
    <div className="ing-dish-row" style={S.ingDishRow}>
      <span style={{width:8,height:8,borderRadius:"50%",background:catColors[ing.category]||"#aaa",flexShrink:0}}/>
      <span style={S.ingDishName}>{ing.name}</span>
      <div style={S.qtyCell}>
        {ed?(
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <input ref={ref} type="number" min="0" step="0.001" style={S.qtyInput} value={dr}
              onChange={e=>setDr(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
              onBlur={commit}/>
            <span style={S.qtyUnitInline}>{ing.unit}</span>
            <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commit();}}>✓</button>
          </div>
        ):(
          <button className="qty-badge" style={S.qtyBadge} onClick={()=>{setDr(String(di.amount));setEd(true);}}>
            <span style={S.qtyNum}>{di.amount}</span>
            <span style={S.qtyUnitBadge}>{ing.unit}</span>
            <span style={S.editIcon}>✎</span>
          </button>
        )}
      </div>
      <span style={{...S.lineCost,color:lc>0?"#e65100":"#ccc"}}>{lc>0?`${lc.toFixed(2)} ₽`:"—"}</span>
      <button className="rm-ing-btn" style={S.rmIngBtn} onClick={()=>onRemove(di.id)}>✕</button>
    </div>
  );
}

// ── AddIngDropdown ────────────────────────────────────────────────────────────
function AddIngDropdown({dishIngIds,allIngs,onAdd,onClose}){
  const [sel,setSel]=useState("");const [amt,setAmt]=useState("");
  const avail=allIngs.filter(i=>!dishIngIds.includes(i.id));
  const selIng=allIngs.find(i=>i.id===Number(sel));
  const ref=useRef();
  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);
  return(
    <div ref={ref} style={S.addIngDrop}>
      <div style={S.dropTitle}>Добавить ингредиент</div>
      <select style={S.dropSelect} value={sel} onChange={e=>setSel(e.target.value)}>
        <option value="">— выберите —</option>
        {avail.map(i=><option key={i.id} value={i.id}>{i.name} ({i.unit})</option>)}
      </select>
      {sel&&(
        <div style={{display:"flex",gap:6,marginTop:8,alignItems:"center"}}>
          <input autoFocus type="number" min="0" step="0.001" style={S.dropAmtInput}
            placeholder={`кол-во, ${selIng?.unit}`} value={amt} onChange={e=>setAmt(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&sel&&amt){onAdd(Number(sel),Number(amt));onClose();}}}/>
          <button style={{...S.dropAddBtn,opacity:sel&&amt?1:0.45}} disabled={!sel||!amt}
            onClick={()=>{onAdd(Number(sel),Number(amt));onClose();}}>Добавить</button>
        </div>
      )}
    </div>
  );
}

// ── DishCard ──────────────────────────────────────────────────────────────────
function DishCard({dish,allIngs,onUpdate,onDelete}){
  const [exp,setExp]=useState(false);const [showDrop,setShowDrop]=useState(false);
  const [edTara,setEdTara]=useState(false);const [taraDr,setTaraDr]=useState("");const taraRef=useRef();
  const [edTaraName,setEdTaraName]=useState(false);const [taraNameDr,setTaraNameDr]=useState("");const taraNameRef=useRef();
  useEffect(()=>{if(edTara&&taraRef.current)taraRef.current.focus();},[edTara]);
  useEffect(()=>{if(edTaraName&&taraNameRef.current)taraNameRef.current.focus();},[edTaraName]);
  const cost=calcCost(dish.ingredients,allIngs,dish.taraCost);
  const commitTara=()=>{const v=parseFloat(taraDr);onUpdate(dish.id,{taraCost:isNaN(v)?0:v});setEdTara(false);};
  return(
    <div style={{...S.dishCard,borderColor:exp?"#a5d6a7":"#e8f5e9"}}>
      <div className="dish-top" style={S.dishTop} onClick={()=>setExp(v=>!v)}>
        <div style={S.dishTopLeft}>
          <span style={{fontSize:36}}>{dish.emoji}</span>
          <div>
            <div style={S.dishName}>{dish.name}</div>
            {cost>0&&<div style={{marginTop:4,fontSize:13,color:"#e65100",fontWeight:600}}>с/с {cost.toFixed(2)} ₽</div>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={S.ingCountBadge}>{dish.ingredients.length} ингр.</span>
          <span style={{fontSize:16,color:"#a5d6a7",display:"inline-block",transform:exp?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
        </div>
      </div>
      {exp&&(
        <div style={S.dishBody}>
          <div style={S.ingTableHead}>
            <span style={{flex:1}}>Ингредиент</span>
            <span style={{width:148,textAlign:"center"}}>Количество</span>
            <span style={{width:76,textAlign:"right"}}>С/С</span>
            <span style={{width:28}}/>
          </div>
          {dish.ingredients.length===0&&<div style={{padding:"14px 0",textAlign:"center",fontSize:13,color:"#bdbdbd"}}>Нет ингредиентов</div>}
          {dish.ingredients.map(di=>(
            <DishIngRow key={di.id} di={di} allIngs={allIngs}
              onChangeAmount={(id,v)=>onUpdate(dish.id,{ingredients:dish.ingredients.map(d=>d.id===id?{...d,amount:v}:d)})}
              onRemove={id=>onUpdate(dish.id,{ingredients:dish.ingredients.filter(d=>d.id!==id)})}/>
          ))}
          <div style={S.taraRow}>
            <span>📦</span>
            {/* Tara name — editable */}
            {edTaraName ? (
              <input ref={taraNameRef} style={{...S.qtyInput,width:120,textAlign:"left",fontSize:12}} value={taraNameDr} placeholder="Название тары"
                onChange={e=>setTaraNameDr(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"){onUpdate(dish.id,{taraName:taraNameDr});setEdTaraName(false);}if(e.key==="Escape")setEdTaraName(false);}}
                onBlur={()=>{onUpdate(dish.id,{taraName:taraNameDr});setEdTaraName(false);}}/>
            ) : (
              <span style={{...S.taraLabel,cursor:"pointer",minWidth:80}} onClick={()=>{setTaraNameDr(dish.taraName||"");setEdTaraName(true);}}>
                {dish.taraName||"Тара"} ✎
              </span>
            )}
            <div style={S.taraQtyCell}>
              {edTara?(
                <div style={{display:"flex",alignItems:"center",gap:4}}>
                  <input ref={taraRef} type="number" min="0" step="0.01" style={S.qtyInput} value={taraDr} placeholder="0"
                    onChange={e=>setTaraDr(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")commitTara();if(e.key==="Escape")setEdTara(false);}}
                    onBlur={commitTara}/>
                  <span style={S.qtyUnitInline}>₽</span>
                  <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commitTara();}}>✓</button>
                </div>
              ):(
                <button className="qty-badge tara-badge" style={S.qtyBadge}
                  onClick={()=>{setTaraDr(String(dish.taraCost||""));setEdTara(true);}}>
                  <span style={S.qtyNum}>{dish.taraCost>0?dish.taraCost:"—"}</span>
                  {dish.taraCost>0&&<span style={S.qtyUnitBadge}>₽</span>}
                  <span style={S.editIcon}>✎</span>
                </button>
              )}
            </div>
            <span style={{...S.lineCost,color:dish.taraCost>0?"#e65100":"#ccc"}}>{dish.taraCost>0?`${Number(dish.taraCost).toFixed(2)} ₽`:"—"}</span>
            <span style={{width:28}}/>
          </div>
          <div style={S.dishFooter}>
            <div style={{position:"relative"}}>
              <button className="add-ing-btn" style={S.addIngBtn} onClick={e=>{e.stopPropagation();setShowDrop(v=>!v);}}>+ Ингредиент</button>
              {showDrop&&<AddIngDropdown dishIngIds={dish.ingredients.map(d=>d.id)} allIngs={allIngs}
                onAdd={(id,a)=>onUpdate(dish.id,{ingredients:[...dish.ingredients,{id,amount:a}]})}
                onClose={()=>setShowDrop(false)}/>}
            </div>
            {cost>0&&<div style={S.costSummary}><span style={{fontSize:12,color:"#9e9e9e"}}>Итого с/с:</span><span style={{fontSize:14,color:"#e65100",fontWeight:700}}>{cost.toFixed(2)} ₽</span></div>}
            <button className="del-dish-btn" style={S.delDishBtn} onClick={()=>onDelete(dish.id)}>🗑</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DayTableRow ───────────────────────────────────────────────────────────────
function DayTableRow({dish,portions,dishCost,rowTotal,readOnly,chefDone,onChangePortions}){
  const [ed,setEd]=useState(false);const [dr,setDr]=useState("");const ref=useRef();
  useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
  const commit=()=>{onChangePortions(Math.max(0,parseInt(dr)||0));setEd(false);};
  const active=portions>0;
  return(
    <div className="day-dish-row" style={{...S.dayDishRow,background:active?"#fafff8":"#fff",borderColor:active?"#c8e6c9":"#f0f0f0",opacity:chefDone?0.5:1}}>
      <span style={{fontSize:24,flexShrink:0,opacity:active?1:0.4}}>{dish.emoji}</span>
      <div style={{flex:1,minWidth:0}}>
        <span style={{...S.dayDishName,opacity:active?1:0.55}}>{dish.name}</span>
        {chefDone&&<span style={{marginLeft:8,fontSize:11,color:"#4caf50",fontWeight:600}}>✓ Готово</span>}
      </div>
      <span style={{width:90,textAlign:"center",fontSize:12,color:dishCost>0?"#e65100":"#ccc",fontWeight:500}}>{dishCost>0?`${dishCost.toFixed(2)} ₽`:"—"}</span>
      <div style={{width:130,display:"flex",justifyContent:"center"}}>
        {ed&&!readOnly?(
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <input ref={ref} type="number" min="0" step="1" style={{...S.qtyInput,width:56}} value={dr}
              onChange={e=>setDr(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
              onBlur={commit}/>
            <button style={S.okBtn} onMouseDown={e=>{e.preventDefault();commit();}}>✓</button>
          </div>
        ):(
          <button className={readOnly?"":"qty-badge"} style={{...S.qtyBadge,minWidth:64,cursor:readOnly?"default":"pointer",background:active?"#e8f5e9":"#f5f5f5",borderColor:active?"#a5d6a7":"#e0e0e0"}}
            onClick={readOnly?undefined:()=>{setDr(String(portions));setEd(true);}}>
            <span style={{...S.qtyNum,color:active?"#2e7d32":"#999"}}>{portions}</span>
            <span style={{fontSize:10,color:active?"#81c784":"#bbb"}}>порц.</span>
            {!readOnly&&<span style={S.editIcon}>✎</span>}
          </button>
        )}
      </div>
      <span style={{width:100,textAlign:"right",fontSize:13,fontWeight:rowTotal>0?700:400,color:rowTotal>0?"#e65100":"#ccc"}}>{rowTotal>0?`${rowTotal.toFixed(2)} ₽`:"—"}</span>
    </div>
  );
}

// ── Modal wrapper ─────────────────────────────────────────────────────────────
function Modal({onClose,children}){
  return(
    <div style={S.overlay} onClick={onClose}>
      <div style={{...S.modal,cursor:"default"}} onClick={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState("dishes");
  const [dishes,setDishes]=useState(()=>ls.get("eco_dishes",DEF_DISHES));
  const [ingredients,setIngredients]=useState(()=>ls.get("eco_ingredients",DEF_ING));
  const [cooks,setCooks]=useState(()=>ls.get("eco_cooks",DEF_COOKS));
  const [showAddDish,setShowAddDish]=useState(false);
  const [showAddIng,setShowAddIng]=useState(false);
  const [showAddCook,setShowAddCook]=useState(false);
  const [editIng,setEditIng]=useState(null);
  const [editIngUnit,setEditIngUnit]=useState(null);
  const [editCook,setEditCook]=useState(null);
  const [newDish,setNewDish]=useState({name:"",emoji:"🍽️"});
  const [newIng,setNewIng]=useState({name:"",unit:"кг",category:"Овощи",costPer:""});
  const [newCook,setNewCook]=useState({name:"",salary:""});
  const [dishSearch,setDishSearch]=useState("");
  const [ingSearch,setIngSearch]=useState("");
  const [dayPortions,setDayPortions]=useState({});
  const [chefDone,setChefDone]=useState({});
  const [menuDate,setMenuDate]=useState(()=>new Date().toISOString().slice(0,10));
  const [savedDates,setSavedDates]=useState([]);
  const [syncStatus,setSyncStatus]=useState("ok");
  const [published,setPublished]=useState(false);
  const [chefCalling,setChefCalling]=useState(false);
  const [chatOpen,setChatOpen]=useState(false);
  const [chatMessages,setChatMessages]=useState([]);
  const [chatInput,setChatInput]=useState("");
  const [chatUnread,setChatUnread]=useState(0);
  const chatEndRef=useRef(null);
  const [scheduleDate,setScheduleDate]=useState(()=>new Date().toISOString().slice(0,10));
  const [scheduleData,setScheduleData]=useState({});
  const [purchases,setPurchases]=useState({});
  const [purchaseDate,setPurchaseDate]=useState(()=>new Date().toISOString().slice(0,10));
  const [periodFrom,setPeriodFrom]=useState(()=>new Date().toISOString().slice(0,10));
  const [periodTo,setPeriodTo]=useState(()=>new Date().toISOString().slice(0,10));
  const [showPeriod,setShowPeriod]=useState(false);
  const [newPurchase,setNewPurchase]=useState({supplier:"",amount:""});
  const [editPurchase,setEditPurchase]=useState(null);
  const [addingPurchase,setAddingPurchase]=useState(false);

  const today=new Date().toISOString().slice(0,10);
  const isReadOnly=menuDate<today;

  // ── Chat sounds ─────────────────────────────────────────────────────────
  const playChatSend=()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[880,0],[1100,0.1]].forEach(([freq,when])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="sine";o.frequency.value=freq;
        const t=ctx.currentTime+when;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
        o.start(t);o.stop(t+0.2);
      });
    }catch{}
  };
  const playChatReceive=()=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [[1047,0],[880,0.12]].forEach(([freq,when])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type="triangle";o.frequency.value=freq;
        const t=ctx.currentTime+when;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.22,t+0.03);
        g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        o.start(t);o.stop(t+0.35);
      });
    }catch{}
  };

  // Persist dishes & ingredients
  useEffect(()=>{ls.set("eco_dishes",dishes);db.ref("dishes").set(dishes).catch(()=>{});},[dishes]);
  useEffect(()=>{ls.set("eco_ingredients",ingredients);db.ref("ingredients").set(ingredients).catch(()=>{});},[ingredients]);
  useEffect(()=>{ls.set("eco_cooks",cooks);db.ref("cooks").set(cooks).catch(()=>{});},[cooks]);

  // Saved dates
  useEffect(()=>{
    const ref=db.ref("daymenu");
    ref.on("value",snap=>{
      const d=snap.val();
      setSavedDates(d?Object.keys(d).sort().reverse():[]);
    });
    return()=>ref.off();
  },[]);

  // Request notification permission & listen for chef calls
  useEffect(()=>{
    if("Notification"in window && Notification.permission==="default"){
      Notification.requestPermission();
    }
    let lastCall=null;
    const ref=db.ref("callAdmin");
    ref.on("value",snap=>{
      const val=snap.val();
      if(val&&val.ts&&val.ts!==lastCall&&lastCall!==null){
        setChefCalling(true);
        setTimeout(()=>setChefCalling(false),15000);
        if(Notification.permission==="granted"){
          const n=new Notification("📞 Вызов от повара!",{
            body:val.message||"Повар вызывает администратора",
            icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232e7d32'/><text y='.9em' font-size='80' x='10'>🌿</text></svg>",
            requireInteraction:true,
            vibrate:[200,100,200],
            tag:"chef-call",
          });
          n.onclick=()=>{window.focus();n.close();};
        }
        try{
          const ctx=new(window.AudioContext||window.webkitAudioContext)();
          [880,1047,1319].forEach((freq,i)=>{
            const o=ctx.createOscillator(),g=ctx.createGain();
            o.connect(g);g.connect(ctx.destination);
            o.type="triangle";o.frequency.value=freq;
            const t=ctx.currentTime+i*0.15;
            g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.35,t+0.05);
            g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
            o.start(t);o.stop(t+0.4);
          });
        }catch{}
        if("serviceWorker"in navigator){
          navigator.serviceWorker.ready.then(reg=>{
            reg.active?.postMessage({type:"CALL_ADMIN",message:val.message});
          });
        }
      }
      lastCall=val?.ts||null;
    });
    return()=>ref.off();
  },[]);

  // Chat listener
  useEffect(()=>{
    const ref=db.ref("chat");
    let prevCount=null;
    ref.limitToLast(100).on("value",snap=>{
      const data=snap.val();
      if(!data){setChatMessages([]);prevCount=0;return;}
      const msgs=Object.values(data).sort((a,b)=>a.ts-b.ts);
      if(prevCount!==null && msgs.length>prevCount){
        const newest=msgs[msgs.length-1];
        if(newest.sender==="chef") playChatReceive();
      }
      prevCount=msgs.length;
      setChatMessages(msgs);
      if(!chatOpen){
        const lastSeen=ls.get("chat_last_seen",0);
        setChatUnread(msgs.filter(m=>m.sender==="chef"&&m.ts>lastSeen).length);
      }
    });
    return()=>ref.off();
  },[]);

  // Day portions
  useEffect(()=>{
    const ref=db.ref(`daymenu/${menuDate}`);
    ref.on("value",snap=>{const d=snap.val()||{};setDayPortions(d.portions||{});setChefDone(d.done||{});});
    return()=>ref.off();
  },[menuDate]);

  // Schedule
  useEffect(()=>{
    const ref=db.ref(`schedule/${scheduleDate}`);
    ref.on("value",snap=>{setScheduleData(snap.val()||{});});
    return()=>ref.off();
  },[scheduleDate]);

  // Purchases
  useEffect(()=>{
    const ref=db.ref("purchases");
    ref.on("value",snap=>{setPurchases(snap.val()||{});});
    return()=>ref.off();
  },[]);

  const sendChatMsg=(text,imageData)=>{
    if(!text&&!imageData)return;
    playChatSend();
    const msg={id:Date.now(),ts:Date.now(),sender:"admin",text:text||"",image:imageData||null};
    db.ref(`chat/${msg.id}`).set(msg).catch(()=>{});
    setChatInput("");
  };
  const compressImage=(file)=>new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=900;const ratio=Math.min(MAX/img.width,MAX/img.height,1);
        const canvas=document.createElement("canvas");
        canvas.width=Math.round(img.width*ratio);canvas.height=Math.round(img.height*ratio);
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL("image/jpeg",0.75));
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
  const handleChatImage=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const compressed=await compressImage(file);
    playChatSend();
    sendChatMsg("",compressed);e.target.value="";
  };
  const openChat=()=>{
    setChatOpen(true);setChatUnread(0);
    ls.set("chat_last_seen",Date.now());
    setTimeout(()=>chatEndRef.current?.scrollIntoView({behavior:"smooth"}),100);
  };

  const savePortions=useCallback(async(p)=>{
    setSyncStatus("saving");
    try{await db.ref(`daymenu/${menuDate}/portions`).set(p);setSyncStatus("ok");}
    catch{setSyncStatus("ok");}
  },[menuDate]);

  const setPortions=(dishId,val)=>{
    if(isReadOnly)return;
    const n=Math.max(0,parseInt(val)||0);
    setDayPortions(p=>{const next={...p,[dishId]:n};savePortions(next);return next;});
  };
  const clearDayMenu=()=>{if(isReadOnly)return;setDayPortions({});db.ref(`daymenu/${menuDate}/portions`).set({}).catch(()=>{});};
  const publishMenu=async()=>{
    if(isReadOnly||dayPortionsTotal===0)return;
    await db.ref(`daymenu/${menuDate}/published`).set(Date.now()).catch(()=>{});
    setPublished(true);setTimeout(()=>setPublished(false),4000);
  };

  const updateDish=(id,patch)=>setDishes(p=>p.map(d=>d.id===id?{...d,...patch}:d));
  const deleteDish=(id)=>setDishes(p=>p.filter(d=>d.id!==id));
  const removeIng=(id)=>setIngredients(p=>p.filter(i=>i.id!==id));
  const saveIngCost=(id,c)=>{setIngredients(p=>p.map(i=>i.id===id?{...i,costPer:Number(c)}:i));setEditIng(null);};
  const saveIngUnit=(id,u)=>{setIngredients(p=>p.map(i=>i.id===id?{...i,unit:u}:i));setEditIngUnit(null);};

  const addDish=()=>{if(!newDish.name)return;setDishes(p=>[...p,{...newDish,id:Date.now(),taraCost:0,ingredients:[]}]);setNewDish({name:"",emoji:"🍽️"});setShowAddDish(false);};
  const addIng=()=>{if(!newIng.name)return;setIngredients(p=>[...p,{...newIng,id:Date.now(),costPer:Number(newIng.costPer)||0}]);setNewIng({name:"",unit:"кг",category:"Овощи",costPer:""});setShowAddIng(false);};

  const toggleCookWorking=(id)=>{db.ref(`schedule/${scheduleDate}/${id}`).set(!(scheduleData[id]||false)).catch(()=>{});};
  const saveCook=(id,name,salary)=>{setCooks(p=>p.map(c=>c.id===id?{...c,name,salary:Number(salary)}:c));setEditCook(null);};
  const deleteCook=(id)=>setCooks(p=>p.filter(c=>c.id!==id));
  const addCook=()=>{if(!newCook.name)return;setCooks(p=>[...p,{id:Date.now(),name:newCook.name,salary:Number(newCook.salary)||0}]);setNewCook({name:"",salary:""});setShowAddCook(false);};

  const addPurchase=()=>{
    if(!newPurchase.supplier||!newPurchase.amount)return;
    const entry={id:Date.now(),supplier:newPurchase.supplier,amount:Number(newPurchase.amount)};
    const list=[...(purchases[purchaseDate]||[]),entry];
    db.ref(`purchases/${purchaseDate}`).set(list).catch(()=>{});
    setNewPurchase({supplier:"",amount:""});setAddingPurchase(false);
  };
  const deletePurchase=(date,id)=>{
    const list=(purchases[date]||[]).filter(p=>p.id!==id);
    db.ref(`purchases/${date}`).set(list.length?list:null).catch(()=>{});
  };
  const saveEditPurchase=()=>{
    if(!editPurchase)return;
    const list=(purchases[editPurchase.date]||[]).map(p=>p.id===editPurchase.id?{...p,supplier:editPurchase.supplier,amount:Number(editPurchase.amount)}:p);
    db.ref(`purchases/${editPurchase.date}`).set(list).catch(()=>{});
    setEditPurchase(null);
  };

  // Computed
  const activeDay=dishes.map(d=>({dish:d,portions:dayPortions[d.id]||0})).filter(x=>x.portions>0);
  const dayTotal=activeDay.reduce((s,{dish,portions})=>s+calcCost(dish.ingredients,ingredients,dish.taraCost)*portions,0);
  const dayPortionsTotal=activeDay.reduce((s,x)=>s+x.portions,0);
  const doneCount=activeDay.filter(({dish})=>chefDone[dish.id]).length;
  const dayIngTotals=()=>{const t={};activeDay.forEach(({dish,portions})=>{dish.ingredients.forEach(({id,amount})=>{t[id]=(t[id]||0)+amount*portions;});});return Object.entries(t).map(([id,total])=>({ing:ingredients.find(i=>i.id===Number(id)),total})).filter(x=>x.ing);};
  const filtDishes=dishes.filter(d=>d.name.toLowerCase().includes(dishSearch.toLowerCase()));
  const filtIngs=ingredients.filter(i=>i.name.toLowerCase().includes(ingSearch.toLowerCase()));
  const visCats=[...new Set(filtIngs.map(i=>i.category))];
  const workingCooks=cooks.filter(c=>scheduleData[c.id]);
  const totalSalary=workingCooks.reduce((s,c)=>s+c.salary,0);
  const dayPurchases=purchases[purchaseDate]||[];
  const dayPurchaseTotal=dayPurchases.reduce((s,p)=>s+(p.amount||0),0);
  const periodPurchases=Object.entries(purchases).filter(([d])=>d>=periodFrom&&d<=periodTo).sort(([a],[b])=>a.localeCompare(b));
  const periodTotal=periodPurchases.reduce((s,[,list])=>s+list.reduce((ss,p)=>ss+(p.amount||0),0),0);

  return(
    <div style={S.root}>
      <header style={S.header}>
        <div style={S.logo}>
          <span style={{fontSize:30}}>🌿</span>
          <div>
            <div style={S.logoTitle}>Эколавка <span style={{width:8,height:8,borderRadius:"50%",display:"inline-block",background:syncStatus==="saving"?"#ffa726":"#4caf50",verticalAlign:"middle"}}/></div>
            <div style={S.logoSub}>Администратор</div>
          </div>
        </div>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {[
            {key:"dishes",label:"🍽️ Блюда"},
            {key:"ingredients",label:"🥬 Ингред."},
            {key:"daymenu",label:"📋 Меню"},
            {key:"schedule",label:"👨‍🍳 График"},
            {key:"purchases",label:"🛒 Закупки"},
          ].map(({key,label})=>(
            <button key={key} className="tab-btn" onClick={()=>setTab(key)} style={{...S.tabBtn,...(tab===key?S.tabActive:{})}}>{label}</button>
          ))}
        </div>
      </header>

      <main style={S.main}>
        {/* Chef call banner */}
        {chefCalling&&(
          <div style={{position:"fixed",top:0,left:0,right:0,zIndex:999,background:"linear-gradient(135deg,#e65100,#ff6d00)",color:"#fff",padding:"16px 20px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 4px 24px rgba(230,81,0,0.5)"}}>
            <span style={{fontSize:32}}>📞</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:15,fontWeight:700}}>Повар вызывает администратора!</div>
              <div style={{fontSize:12,opacity:0.9,marginTop:3}}>Зайдите на кухню или свяжитесь с поваром</div>
            </div>
            <button onClick={()=>setChefCalling(false)} style={{background:"rgba(255,255,255,0.25)",border:"none",color:"#fff",padding:"8px 16px",borderRadius:20,cursor:"pointer",fontFamily:"'Geologica',sans-serif",fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>
              Принято ✓
            </button>
          </div>
        )}

        {/* DISHES */}
        {tab==="dishes"&&(
          <>
            <div style={S.secHead}>
              <div><div style={S.secTitle}>Блюда</div><div style={S.secHint}>Раскройте для редактирования</div></div>
              <button className="add-btn" style={S.addBtn} onClick={()=>setShowAddDish(true)}>+ Добавить</button>
            </div>
            <div style={S.searchWrap}>
              <span>🔍</span>
              <input style={S.searchInput} placeholder="Найти блюдо..." value={dishSearch} onChange={e=>setDishSearch(e.target.value)}/>
              {dishSearch&&<button style={S.searchClear} onClick={()=>setDishSearch("")}>✕</button>}
            </div>
            {filtDishes.length===0?<div style={S.emptySearch}>Не найдено</div>:(
              <div style={S.dishList}>
                {filtDishes.map(dish=><DishCard key={dish.id} dish={dish} allIngs={ingredients} onUpdate={updateDish} onDelete={deleteDish}/>)}
              </div>
            )}
          </>
        )}

        {/* INGREDIENTS */}
        {tab==="ingredients"&&(
          <>
            <div style={S.secHead}>
              <div><div style={S.secTitle}>Ингредиенты</div><div style={S.secHint}>{ingredients.length} позиций</div></div>
              <button className="add-btn" style={S.addBtn} onClick={()=>setShowAddIng(true)}>+ Добавить</button>
            </div>
            <div style={S.searchWrap}>
              <span>🔍</span>
              <input style={S.searchInput} placeholder="Найти ингредиент..." value={ingSearch} onChange={e=>setIngSearch(e.target.value)}/>
              {ingSearch&&<button style={S.searchClear} onClick={()=>setIngSearch("")}>✕</button>}
            </div>
            {filtIngs.length===0?<div style={S.emptySearch}>Не найдено</div>:visCats.map(cat=>(
              <div key={cat} style={{marginBottom:18}}>
                <div style={S.catTitle}>
                  <span style={{width:10,height:10,borderRadius:"50%",background:catColors[cat]||"#aaa",display:"inline-block"}}/>
                  {cat}
                </div>
                {filtIngs.filter(i=>i.category===cat).map(ing=>(
                  <div key={ing.id} className="ing-row" style={S.ingRow}>
                    <span style={S.ingName}>{ingSearch?hl(ing.name,ingSearch):ing.name}</span>
                    {editIngUnit?.id===ing.id?(
                      <div style={{display:"flex",gap:4}}>
                        {UNITS.map(u=><button key={u} style={{...S.unitOption,background:editIngUnit.unit===u?"#4caf50":"#f1f8e9",color:editIngUnit.unit===u?"#fff":"#4caf50",border:`1.5px solid ${editIngUnit.unit===u?"#4caf50":"#c8e6c9"}`}} onClick={()=>saveIngUnit(ing.id,u)}>{u}</button>)}
                        <button style={S.cancelSmBtn} onClick={()=>setEditIngUnit(null)}>✕</button>
                      </div>
                    ):(
                      <button className="unit-chip" style={S.unitChip} onClick={()=>setEditIngUnit({id:ing.id,unit:ing.unit})}>{ing.unit} ✎</button>
                    )}
                    {editIng?.id===ing.id?(
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <input autoFocus type="number" step="0.01" style={S.inlineInput} value={editIng.costPer}
                          onChange={e=>setEditIng({...editIng,costPer:e.target.value})}
                          onKeyDown={e=>{if(e.key==="Enter")saveIngCost(ing.id,editIng.costPer);if(e.key==="Escape")setEditIng(null);}}/>
                        <span style={{fontSize:11,color:"#9e9e9e"}}>₽/{ing.unit}</span>
                        <button style={S.saveBtn} onClick={()=>saveIngCost(ing.id,editIng.costPer)}>✓</button>
                        <button style={S.cancelSmBtn} onClick={()=>setEditIng(null)}>✕</button>
                      </div>
                    ):(
                      <button className="edit-cost-btn" style={S.costChip} onClick={()=>setEditIng({id:ing.id,costPer:ing.costPer??""})}>
                        💰 {ing.costPer?`${ing.costPer} ₽/${ing.unit}`:"—"}
                      </button>
                    )}
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:(catColors[ing.category]||"#aaa")+"22",color:catColors[ing.category]||"#555",fontWeight:500}}>{ing.category}</span>
                    <button className="close-btn" style={S.removeBtn} onClick={()=>removeIng(ing.id)}>✕</button>
                  </div>
                ))}
              </div>
            ))}
          </>
        )}

        {/* DAY MENU */}
        {tab==="daymenu"&&(
          <>
            <div style={S.secHead}>
              <div>
                <div style={S.secTitle}>📋 Меню на день</div>
                <div style={S.secHint}>{isReadOnly?"🔒 Только просмотр":"Повар видит изменения автоматически"}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input type="date" style={{...S.input,width:"auto",marginBottom:0,padding:"7px 10px",fontSize:13}} value={menuDate} onChange={e=>setMenuDate(e.target.value)}/>
                {!isReadOnly&&dayPortionsTotal>0&&<button className="clear-day-btn" style={S.clearDayBtn} onClick={clearDayMenu}>Сбросить</button>}
                {!isReadOnly&&dayPortionsTotal>0&&(
                  <button onClick={publishMenu} style={{padding:"8px 14px",background:published?"#388e3c":"#1b5e20",color:"#fff",border:"none",borderRadius:20,fontFamily:"'Geologica',sans-serif",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.3s",whiteSpace:"nowrap"}}>
                    {published?"✓ Отправлено!":"🔔 Повару"}
                  </button>
                )}
              </div>
            </div>
            {dayPortionsTotal>0&&(
              <div style={{background:"#e8f5e9",borderRadius:12,padding:"10px 16px",marginBottom:12,border:"2px solid #a5d6a7",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:11,fontWeight:700,color:"#2e7d32"}}>👨‍🍳 Прогресс повара</div>
                  <div style={{fontSize:12,color:"#4caf50",marginTop:2}}>{doneCount} из {activeDay.length} готово</div>
                </div>
                <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:18,fontWeight:900,color:doneCount===activeDay.length?"#2e7d32":"#81c784"}}>
                  {activeDay.length>0?Math.round(doneCount/activeDay.length*100):0}%
                </div>
              </div>
            )}
            <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{...S.dateBanner,borderColor:isReadOnly?"#ffe082":"#e8f5e9",background:isReadOnly?"#fffde7":"#fff"}}>
                  <span style={S.dateBannerText}>{new Date(menuDate+"T00:00:00").toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"})}</span>
                  {dayPortionsTotal>0&&<span style={{fontSize:12,color:"#81c784"}}>{dayPortionsTotal} порц. · {dayTotal.toFixed(0)} ₽</span>}
                </div>
                <div style={S.dayTableHead}>
                  <span style={{flex:1}}>Блюдо</span>
                  <span style={{width:90,textAlign:"center"}}>С/С</span>
                  <span style={{width:130,textAlign:"center"}}>Порций</span>
                  <span style={{width:100,textAlign:"right"}}>Итого</span>
                </div>
                <div style={{marginBottom:14}}>
                  {dishes.map(dish=>{
                    const portions=dayPortions[dish.id]||0;
                    const dc=calcCost(dish.ingredients,ingredients,dish.taraCost);
                    return <DayTableRow key={dish.id} dish={dish} portions={portions} dishCost={dc} rowTotal={dc*portions} readOnly={isReadOnly} chefDone={!!chefDone[dish.id]} onChangePortions={v=>setPortions(dish.id,v)}/>;
                  })}
                </div>
                <div style={S.daySummaryCard}>
                  <div style={S.daySummaryRow}><span style={S.daySummaryLabel}>Итого порций:</span><span style={S.daySummaryValue}>{dayPortionsTotal}</span></div>
                  <div style={{...S.daySummaryRow,marginBottom:0}}><span style={S.daySummaryLabel}>Себестоимость:</span><span style={{...S.daySummaryValue,color:"#e65100",fontSize:16}}>{dayTotal.toFixed(2)} ₽</span></div>
                </div>
                {dayPortionsTotal>0&&(
                  <div style={{marginTop:14}}>

        <Modal onClose={()=>setShowAddCook(false)}>
          <div style={S.modalTitle}>👨‍🍳 Новый повар</div>
          <input style={S.input} placeholder="Имя повара" value={newCook.name} onChange={e=>setNewCook({...newCook,name:e.target.value})}/>
          <input style={S.input} type="number" placeholder="Ставка в день (₽)" value={newCook.salary} onChange={e=>setNewCook({...newCook,salary:e.target.value})}/>
          <div style={S.modalActions}>
            <button style={S.cancelBtn} onClick={()=>setShowAddCook(false)}>Отмена</button>
            <button className="add-btn" style={S.addBtn} onClick={addCook}>Добавить</button>
          </div>
        </Modal>
      )}
    </div>
  );
}
