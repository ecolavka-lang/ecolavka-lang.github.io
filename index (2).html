const {useState,useRef,useEffect}=React;
const db=window.db;
const ls={get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const today=new Date().toISOString().slice(0,10);

// ── Data ──────────────────────────────────────────────────────────────────────
const DEF_ING=[{id:1,name:"Шпинат",unit:"кг",category:"Зелень"},{id:2,name:"Нут",unit:"кг",category:"Бобовые"},{id:3,name:"Авокадо",unit:"шт",category:"Фрукты"},{id:4,name:"Киноа",unit:"кг",category:"Крупы"},{id:5,name:"Лимон",unit:"шт",category:"Фрукты"},{id:6,name:"Оливковое масло",unit:"л",category:"Масла"},{id:7,name:"Помидоры черри",unit:"кг",category:"Овощи"},{id:8,name:"Огурец",unit:"шт",category:"Овощи"},{id:9,name:"Семена чиа",unit:"кг",category:"Семена"},{id:10,name:"Кокосовое молоко",unit:"л",category:"Напитки"},{id:11,name:"Банан",unit:"шт",category:"Фрукты"},{id:12,name:"Миндаль",unit:"кг",category:"Орехи"},{id:13,name:"Тофу",unit:"кг",category:"Белок"},{id:14,name:"Свёкла",unit:"кг",category:"Овощи"},{id:15,name:"Имбирь",unit:"кг",category:"Специи"}];
const DEF_DISHES=[{id:1,name:"Боул с киноа",emoji:"🥗",taraCost:0,taraId:null,ingredients:[{id:4,amount:0.1},{id:1,amount:0.05},{id:7,amount:0.08},{id:6,amount:0.02},{id:5,amount:0.5}]},{id:2,name:"Хумус с овощами",emoji:"🫘",taraCost:0,taraId:null,ingredients:[{id:2,amount:0.15},{id:6,amount:0.03},{id:5,amount:1},{id:8,amount:1},{id:7,amount:0.06}]},{id:3,name:"Авокадо тост",emoji:"🥑",taraCost:0,taraId:null,ingredients:[{id:3,amount:1},{id:5,amount:0.5},{id:6,amount:0.01},{id:1,amount:0.02}]},{id:4,name:"Смузи чиа",emoji:"🥤",taraCost:0,taraId:null,ingredients:[{id:9,amount:0.03},{id:10,amount:0.2},{id:11,amount:1},{id:12,amount:0.02}]},{id:5,name:"Тофу со свёклой",emoji:"🧆",taraCost:0,taraId:null,ingredients:[{id:13,amount:0.15},{id:14,amount:0.1},{id:15,amount:0.01},{id:6,amount:0.015}]}];
const DEF_TARA=[{id:1,name:"Контейнер 500мл",cost:12},{id:2,name:"Контейнер 1000мл",cost:18},{id:3,name:"Стакан 400мл",cost:8},{id:4,name:"Пакет крафт",cost:6}];
const DEF_COOKS=[{id:1,name:"Повар 1",salary:2000},{id:2,name:"Повар 2",salary:2000},{id:3,name:"Повар 3",salary:2000},{id:4,name:"Повар 4",salary:2000},{id:5,name:"Повар 5",salary:2000}];
const CC={"Зелень":"#4ade80","Бобовые":"#fb923c","Фрукты":"#f472b6","Крупы":"#facc15","Масла":"#a78bfa","Овощи":"#34d399","Семена":"#60a5fa","Напитки":"#38bdf8","Орехи":"#d97706","Белок":"#e879f9","Специи":"#f87171"};
const UNITS=["кг","л","шт"];
const EMOJIS=["🍕","🍔","🍟","🌭","🥪","🌮","🌯","🥙","🧆","🥚","🍳","🥘","🍲","🥣","🥗","🥫","🧀","🥩","🥓","🍗","🍖","🌽","🥕","🧅","🧄","🥔","🍠","🥐","🥯","🍞","🥖","🥨","🧁","🍰","🎂","🍮","🍭","🍬","🍫","🍿","🍩","🍪","🌰","🥜","🍯","🥞","🧇","🍱","🍘","🍙","🍚","🍛","🍜","🍝","🍣","🍤","🍥","🥮","🍡","🥟","🥠","🥡","🦪","🍦","🍧","🍨","🫐","🍓","🍒","🍑","🥭","🍍","🥥","🥝","🍅","🍆","🥑","🫒","🥦","🥬","🥒","🌶️","🫑","🍄","🌿","🥤","🧃","🧋","🍵","☕","🫖","🍺","🍷","🥂","🍸","🍹","🫙","🍽️"];

// ── Sounds ────────────────────────────────────────────────────────────────────
function snd(notes){try{const c=new(window.AudioContext||window.webkitAudioContext)();notes.forEach(([f,w,dur,type="sine"])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type;o.frequency.value=f;const t=c.currentTime+w;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.3,t+0.05);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.start(t);o.stop(t+dur);});}catch{}}
const sndSend=()=>snd([[880,0,0.2],[1100,0.1,0.2]]);
const sndRecv=()=>snd([[1047,0,0.3,"triangle"],[880,0.12,0.3,"triangle"]]);
const sndAlert=()=>snd([[523,0,0.4],[659,0.18,0.4],[784,0.36,0.4]]);

// ── Helpers ───────────────────────────────────────────────────────────────────
const sel=e=>{const t=e.target;setTimeout(()=>t.select(),0);};
const fmt=n=>n%1===0?String(n):n.toFixed(3).replace(/\.?0+$/,"");

// ── EmojiPicker ───────────────────────────────────────────────────────────────
function EmojiPicker({val,onPick}){
  return <div style={{background:"#f9fbe7",border:"1.5px solid #e8f5e9",borderRadius:12,padding:10,marginBottom:10}}>
    <div style={{fontSize:11,color:"#81c784",fontWeight:600,marginBottom:7}}>Выберите иконку</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(10,1fr)",gap:3,maxHeight:160,overflowY:"auto"}}>
      {EMOJIS.map(e=><button key={e} onClick={()=>onPick(e)} style={{fontSize:20,padding:3,borderRadius:7,border:`2px solid ${val===e?"#4caf50":"transparent"}`,background:val===e?"#e8f5e9":"transparent",cursor:"pointer"}}>{e}</button>)}
    </div>
    <div style={{marginTop:7,fontSize:12,color:"#9e9e9e"}}>Выбрано: <span style={{fontSize:20}}>{val}</span></div>
  </div>;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function Modal({onClose,title,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",backdropFilter:"blur(4px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:18,padding:22,minWidth:300,maxWidth:420,width:"90%",boxShadow:"0 16px 60px rgba(0,0,0,0.15)",cursor:"default",maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:15,color:"#1b5e20",marginBottom:14}}>{title}</div>
      {children}
    </div>
  </div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  // Core data
  const [dishes,setDishes]=useState(()=>ls.get("eco_dishes",DEF_DISHES));
  const [ingredients,setIngredients]=useState(()=>ls.get("eco_ingredients",DEF_ING));
  const [taraList,setTaraList]=useState(()=>ls.get("eco_tara",DEF_TARA));
  const [cooks,setCooks]=useState(()=>ls.get("eco_cooks",DEF_COOKS));
  // Firebase real-time
  const [dayPortions,setDayPortions]=useState({});
  const [chefDone,setChefDone]=useState({});
  const [savedDates,setSavedDates]=useState([]);
  const [scheduleData,setScheduleData]=useState({});
  const [purchases,setPurchases]=useState({});
  const [purchaseDone,setPurchaseDone]=useState({});
  const [chefShopping,setChefShopping]=useState({});
  const [warehouse,setWarehouse]=useState({});
  const [chatMsgs,setChatMsgs]=useState([]);
  // UI state
  const [tab,setTab]=useState("dishes");
  const [tabBadges,setTabBadges]=useState({daymenu:0,purchases:0,schedule:0,warehouse:0});
  const [menuDate,setMenuDate]=useState(today);
  const [scheduleDate,setScheduleDate]=useState(today);
  const [purchaseDate,setPurchaseDate]=useState(today);
  const [periodFrom,setPeriodFrom]=useState(today);
  const [periodTo,setPeriodTo]=useState(today);
  const [showPeriod,setShowPeriod]=useState(false);
  const [chatOpen,setChatOpen]=useState(false);
  const [chatInput,setChatInput]=useState("");
  const [chatUnread,setChatUnread]=useState(0);
  const [chefCalling,setChefCalling]=useState(false);
  const [syncDot,setSyncDot]=useState("ok");
  const [published,setPublished]=useState(false);
  const [dishSearch,setDishSearch]=useState("");
  const [ingSearch,setIngSearch]=useState("");
  // Modals
  const [modal,setModal]=useState(null); // "addDish"|"addIng"|"addTara"|"addCook"|"addWarehouse"|"costError"
  const [modalData,setModalData]=useState({});
  // Edit states
  const [editIngUnit,setEditIngUnit]=useState(null);
  const [editCook,setEditCook]=useState(null);
  const [editTara,setEditTara]=useState(null);
  const [editPurchase,setEditPurchase]=useState(null);
  const [editWarehouse,setEditWarehouse]=useState(null);
  const [addingPurchase,setAddingPurchase]=useState(false);
  const [showAddWarehouse,setShowAddWarehouse]=useState(false);
  const chatEndRef=useRef();
  const isReadOnly=menuDate<today;

  // ── Firebase persist ────────────────────────────────────────────────────────
  useEffect(()=>{ls.set("eco_dishes",dishes);db.ref("dishes").set(dishes).catch(()=>{});},[dishes]);
  useEffect(()=>{ls.set("eco_ingredients",ingredients);db.ref("ingredients").set(ingredients).catch(()=>{});},[ingredients]);
  useEffect(()=>{ls.set("eco_tara",taraList);db.ref("tara").set(taraList).catch(()=>{});},[taraList]);
  useEffect(()=>{ls.set("eco_cooks",cooks);db.ref("cooks").set(cooks).catch(()=>{});},[cooks]);

  // ── Firebase listeners ──────────────────────────────────────────────────────
  useEffect(()=>{
    // Saved dates
    db.ref("daymenu").on("value",s=>{const d=s.val();setSavedDates(d?Object.keys(d).sort().reverse():[]);});
    // Purchases
    db.ref("purchases").on("value",s=>setPurchases(s.val()||{}));
    // Warehouse
    db.ref("warehouse").on("value",s=>setWarehouse(s.val()||{}));
    // Chef call
    let lastCall=null;
    db.ref("callAdmin").on("value",s=>{
      const v=s.val();
      if(v&&v.ts&&v.ts!==lastCall&&lastCall!==null){
        setChefCalling(true);setTimeout(()=>setChefCalling(false),15000);
        sndAlert();
        if(Notification.permission==="granted")new Notification("📞 Повар вызывает!",{body:"Зайдите на кухню",tag:"chef-call",requireInteraction:true});
      }
      lastCall=v?.ts||null;
    });
    // Chat
    let prevChatLen=null;
    db.ref("chat").limitToLast(100).on("value",s=>{
      const d=s.val();
      const msgs=d?Object.values(d).sort((a,b)=>a.ts-b.ts):[];
      if(prevChatLen!==null&&msgs.length>prevChatLen){
        const n=msgs[msgs.length-1];
        if(n.sender==="chef")sndRecv();
      }
      prevChatLen=msgs.length;
      setChatMsgs(msgs);
      const seen=ls.get("chat_seen",0);
      setChatUnread(msgs.filter(m=>m.sender==="chef"&&m.ts>seen).length);
    });
    // Chat cleanup 3 months
    const cut=Date.now()-90*24*60*60*1000;
    db.ref("chat").once("value",s=>{const d=s.val();if(d)Object.entries(d).forEach(([k,m])=>{if(m.ts<cut)db.ref(`chat/${k}`).remove();});});
    // Schedule badge on new day
    const lastChanged=ls.get("schedule_last_changed",0);
    if(new Date(lastChanged).toISOString().slice(0,10)!==today){
      setTabBadges(p=>({...p,schedule:1}));
    }
    // Notifications permission
    if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
    // Schedule midnight check
    const now=new Date();const midnight=new Date(now);midnight.setHours(24,0,0,0);
    const mt=setTimeout(()=>setTabBadges(p=>({...p,schedule:1})),midnight-now);
    return()=>clearTimeout(mt);
  },[]);

  useEffect(()=>{
    const ref=db.ref(`daymenu/${menuDate}`);
    let first=true;
    ref.on("value",s=>{
      const d=s.val()||{};
      if(!first&&tab!=="daymenu")setTabBadges(p=>({...p,daymenu:p.daymenu+1}));
      first=false;
      setDayPortions(d.portions||{});setChefDone(d.done||{});
    });
    return()=>ref.off();
  },[menuDate]);

  useEffect(()=>{
    const ref=db.ref(`schedule/${scheduleDate}`);
    ref.on("value",s=>setScheduleData(s.val()||{}));
    return()=>ref.off();
  },[scheduleDate]);

  useEffect(()=>{
    const ref=db.ref(`purchaseDone/${purchaseDate}`);
    ref.on("value",s=>setPurchaseDone(s.val()||{}));
    return()=>ref.off();
  },[purchaseDate]);

  useEffect(()=>{
    let first=true,prev="";
    const ref=db.ref(`chefShopping/${today}`);
    ref.on("value",s=>{
      const d=s.val()||{};const str=JSON.stringify(d);
      if(!first&&str!==prev&&Object.values(d).some(v=>v>0)){
        sndAlert();
        if(Notification.permission==="granted")new Notification("🛒 Повар обновил список!",{body:"Проверьте Закупки",tag:"chef-shop"});
        setTabBadges(p=>({...p,purchases:p.purchases+1}));
      }
      prev=str;first=false;setChefShopping(d);
    });
    return()=>ref.off();
  },[]);

  // ── Cost from purchases ─────────────────────────────────────────────────────
  const getIngCostPer=ingId=>{
    let latest=null,latestId=0;
    Object.values(purchases).forEach(list=>(list||[]).forEach(p=>{
      if(p.ingId===ingId&&p.costPer!=null&&p.id>latestId){latestId=p.id;latest=p.costPer;}
    }));
    return latest;
  };
  const dishCost=dish=>{
    const ingCost=dish.ingredients.reduce((s,di)=>{const cp=getIngCostPer(di.id);return cp!==null?s+cp*di.amount:s;},0);
    return ingCost+(dish.taraCost||0);
  };
  const dishMissing=dish=>dish.ingredients.filter(di=>getIngCostPer(di.id)===null).map(di=>ingredients.find(i=>i.id===di.id)?.name).filter(Boolean);

  // ── Computed ────────────────────────────────────────────────────────────────
  const activeDay=dishes.map(d=>({dish:d,portions:dayPortions[d.id]||0})).filter(x=>x.portions>0);
  const dayTotal=activeDay.reduce((s,{dish,portions})=>s+dishCost(dish)*portions,0);
  const dayPortionsTotal=activeDay.reduce((s,x)=>s+x.portions,0);
  const doneCount=activeDay.filter(({dish})=>chefDone[dish.id]).length;
  const dayIngTotals=()=>{const t={};activeDay.forEach(({dish,portions})=>dish.ingredients.forEach(({id,amount})=>{t[id]=(t[id]||0)+amount*portions;}));return Object.entries(t).map(([id,total])=>({ing:ingredients.find(i=>i.id===Number(id)),total})).filter(x=>x.ing);};
  const workingCooks=cooks.filter(c=>scheduleData[c.id]);
  const totalSalary=workingCooks.reduce((s,c)=>s+c.salary,0);
  const dayPurchases=purchases[purchaseDate]||[];
  const dayPurchaseTotal=dayPurchases.reduce((s,p)=>s+(p.amount||0),0);
  const periodPurchases=Object.entries(purchases).filter(([d])=>d>=periodFrom&&d<=periodTo).sort(([a],[b])=>a.localeCompare(b));
  const periodTotal=periodPurchases.reduce((s,[,list])=>s+list.reduce((ss,p)=>ss+(p.amount||0),0),0);
  const chefShoppingItems=Object.entries(chefShopping).map(([ingId,qty])=>({ing:ingredients.find(i=>i.id===Number(ingId)),qty})).filter(x=>x.ing&&x.qty>0);
  const allDone=dayPurchases.length>0&&dayPurchases.every(p=>purchaseDone[p.id]);
  // Warehouse
  const warehouseTotal=Object.entries(warehouse).reduce((s,[,v])=>s+(v.qty||0)*(v.costPer||0),0);
  const excessItems=Object.entries(()=>{
    const ex={};
    (purchases[today]||[]).forEach(p=>{
      if(!p.ingId||!p.quantity)return;
      const req=Number(chefShopping[p.ingId])||0;
      const extra=Number(p.quantity)-req;
      if(extra>0){if(!ex[p.ingId])ex[p.ingId]={qty:0,costPer:p.costPer||0};ex[p.ingId].qty+=extra;}
    });
    return ex;
  });

  const visCats=[...new Set(ingredients.filter(i=>i.name.toLowerCase().includes(ingSearch.toLowerCase())).map(i=>i.category))];

  // ── Actions ─────────────────────────────────────────────────────────────────
  const markTab=key=>{setTab(key);setTabBadges(p=>({...p,[key]:0}));};

  const savePortions=async(p)=>{
    setSyncDot("saving");
    try{await db.ref(`daymenu/${menuDate}/portions`).set(p);setSyncDot("ok");}
    catch{setSyncDot("ok");}
  };
  const setPortions=(dishId,val)=>{
    if(isReadOnly)return;
    const n=Math.max(0,parseInt(val)||0);
    setDayPortions(prev=>{const next={...prev,[dishId]:n};savePortions(next);return next;});
  };
  const clearDay=()=>{if(isReadOnly)return;setDayPortions({});db.ref(`daymenu/${menuDate}/portions`).set({}).catch(()=>{});};
  const publishMenu=async()=>{
    if(isReadOnly||dayPortionsTotal===0)return;
    await db.ref(`daymenu/${menuDate}/published`).set(Date.now()).catch(()=>{});
    setPublished(true);setTimeout(()=>setPublished(false),4000);
  };
  const addDish=()=>{
    const {name,emoji}=modalData;if(!name)return;
    if(dishes.some(d=>d.name.trim().toLowerCase()===name.trim().toLowerCase())){alert("Блюдо с таким названием уже существует");return;}
    setDishes(p=>[...p,{id:Date.now(),name,emoji:emoji||"🍽️",taraCost:0,taraId:null,ingredients:[]}]);
    setModal(null);setModalData({});
  };
  const updateDish=(id,patch)=>setDishes(p=>p.map(d=>d.id===id?{...d,...patch}:d));
  const deleteDish=id=>setDishes(p=>p.filter(d=>d.id!==id));
  const addIng=()=>{
    const {name,unit,category}=modalData;if(!name)return;
    setIngredients(p=>[...p,{id:Date.now(),name,unit:unit||"кг",category:category||"Овощи"}]);
    setModal(null);setModalData({});
  };
  const removeIng=id=>setIngredients(p=>p.filter(i=>i.id!==id));
  const saveIngUnit=(id,u)=>{setIngredients(p=>p.map(i=>i.id===id?{...i,unit:u}:i));setEditIngUnit(null);};
  const addTara=()=>{
    const {name,cost}=modalData;if(!name)return;
    setTaraList(p=>[...p,{id:Date.now(),name,cost:Number(cost)||0}]);
    setModal(null);setModalData({});
  };
  const saveTara=(id,name,cost)=>{
    setTaraList(p=>p.map(t=>t.id===id?{...t,name,cost:Number(cost)}:t));
    setDishes(p=>p.map(d=>d.taraId===id?{...d,taraCost:Number(cost),taraName:name}:d));
    setEditTara(null);
  };
  const deleteTara=id=>{setTaraList(p=>p.filter(t=>t.id!==id));setDishes(p=>p.map(d=>d.taraId===id?{...d,taraId:null,taraCost:0}:d));};
  const addCook=()=>{
    const {name,salary}=modalData;if(!name)return;
    setCooks(p=>[...p,{id:Date.now(),name,salary:Number(salary)||0}]);
    setModal(null);setModalData({});
  };

      <input style={S.inp} type="number" placeholder="Ставка (₽/день)" value={modalData.salary||""} onFocus={sel} onChange={e=>setModalData({...modalData,salary:e.target.value})}/>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={S.cancelBtnLg} onClick={()=>setModal(null)}>Отмена</button>
        <button className="add-btn" style={S.addBtn} onClick={addCook}>Добавить</button>

    </Modal>}
    {modal==="costError"&&<Modal title="⚠️ Нет данных о ценах" onClose={()=>setModal(null)}>

      {(modalData.missing||[]).map(name=><div key={name} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#ffebee",borderRadius:9,border:"1px solid #ef9a9a",marginBottom:5}}>

  </div>;
}

// ── DishBlock ─────────────────────────────────────────────────────────────────
function DishBlock({dish,ingredients,taraList,cost,missing,onUpdate,onDelete,getIngCostPer,onCostError}){
  const [exp,setExp]=useState(false);const [showDrop,setShowDrop]=useState(false);const [showEmoji,setShowEmoji]=useState(false);
  const CC={"Зелень":"#4ade80","Бобовые":"#fb923c","Фрукты":"#f472b6","Крупы":"#facc15","Масла":"#a78bfa","Овощи":"#34d399","Семена":"#60a5fa","Напитки":"#38bdf8","Орехи":"#d97706","Белок":"#e879f9","Специи":"#f87171"};
  const sel=e=>{const t=e.target;setTimeout(()=>t.select(),0);};
  const [edIngId,setEdIngId]=useState(null);const [edAmt,setEdAmt]=useState("");const edRef=useRef();
  useEffect(()=>{if(edIngId&&edRef.current)edRef.current.focus();},[edIngId]);
  const [addIngId,setAddIngId]=useState("");const [addAmt,setAddAmt]=useState("");
  const [edTara,setEdTara]=useState(false);const [taraDr,setTaraDr]=useState("");const taraRef=useRef();
  useEffect(()=>{if(edTara&&taraRef.current)taraRef.current.focus();},[edTara]);
  const commitTara=()=>{const v=parseFloat(taraDr);onUpdate(dish.id,{taraCost:isNaN(v)?0:v});setEdTara(false);};
  const avail=ingredients.filter(i=>!dish.ingredients.map(d=>d.id).includes(i.id));
  return <div style={{background:"#fff",borderRadius:16,border:`2px solid ${exp?"#a5d6a7":"#e8f5e9"}`,marginBottom:10,overflow:"visible"}}>
    <div onClick={()=>setExp(v=>!v)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 15px",cursor:"pointer",borderRadius:16}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span onClick={e=>{e.stopPropagation();setShowEmoji(v=>!v);}} style={{fontSize:34,cursor:"pointer"}} title="Сменить иконку">{dish.emoji}</span>
        <div>
          <div style={{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:13,color:"#1b5e20"}}>{dish.name}</div>
          {missing.length>0?<div style={{marginTop:3,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:11,color:"#e53935",fontWeight:600}}>⚠️ Нет цен</span>
            <button onClick={e=>{e.stopPropagation();onCostError();}} style={{fontSize:10,color:"#e53935",background:"#ffebee",border:"1px solid #ef9a9a",borderRadius:7,padding:"1px 6px",cursor:"pointer"}}>подробнее</button>
          </div>:cost>0?<div style={{marginTop:3,fontSize:12,color:"#e65100",fontWeight:600}}>с/с {cost.toFixed(2)} ₽</div>:null}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:10,color:"#a5d6a7",background:"#f1f8e9",padding:"2px 7px",borderRadius:10}}>{dish.ingredients.length} ингр.</span>
        <span style={{fontSize:15,color:"#a5d6a7",display:"inline-block",transform:exp?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▾</span>
      </div>
    </div>
    {showEmoji&&<div style={{padding:"0 15px 10px"}}><EmojiPicker val={dish.emoji} onPick={e=>{onUpdate(dish.id,{emoji:e});setShowEmoji(false);}}/></div>}
    {exp&&<div style={{borderTop:"1.5px solid #f1f8e9",padding:"0 15px 12px"}}>
      <div style={{display:"flex",alignItems:"center",padding:"7px 0 4px",fontSize:9,color:"#bdbdbd",textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:600,borderBottom:"1px solid #f5f5f5"}}>
        <span style={{flex:1}}>Ингредиент</span><span style={{width:140,textAlign:"center"}}>Количество</span><span style={{width:70,textAlign:"right"}}>С/С</span><span style={{width:28}}/>
      </div>
      {dish.ingredients.map(di=>{
        const ing=ingredients.find(i=>i.id===di.id);if(!ing)return null;
        const cp=getIngCostPer(di.id);const lc=cp!==null?cp*di.amount:null;
        const isEd=edIngId===di.id;
        return <div key={di.id} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 2px",borderBottom:"1px solid #fafafa"}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:CC[ing.category]||"#aaa",flexShrink:0}}/>
          <span style={{flex:1,fontSize:13,color:"#2d4a2e",fontWeight:500}}>{ing.name}</span>
          <div style={{width:140,display:"flex",justifyContent:"center"}}>
            {isEd?<div style={{display:"flex",alignItems:"center",gap:4}}>
              <input ref={edRef} type="number" min="0" step="0.001" style={{width:70,padding:"4px 6px",borderRadius:7,border:"1.5px solid #4caf50",fontSize:13,background:"#fff",color:"#2d4a2e",textAlign:"right"}} value={edAmt} onChange={e=>setEdAmt(e.target.value)} onFocus={sel} onKeyDown={e=>{if(e.key==="Enter"){const v=parseFloat(edAmt);if(!isNaN(v)&&v>=0)onUpdate(dish.id,{ingredients:dish.ingredients.map(d=>d.id===di.id?{...d,amount:v}:d)});setEdIngId(null);}if(e.key==="Escape")setEdIngId(null);}} onBlur={()=>{const v=parseFloat(edAmt);if(!isNaN(v)&&v>=0)onUpdate(dish.id,{ingredients:dish.ingredients.map(d=>d.id===di.id?{...d,amount:v}:d)});setEdIngId(null);}}/>
              <span style={{fontSize:10,color:"#9e9e9e"}}>{ing.unit}</span>
            </div>:<button onClick={()=>{setEdAmt(String(di.amount));setEdIngId(di.id);}} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 8px",borderRadius:16,border:"1.5px solid #e8f5e9",background:"#fafff8",cursor:"pointer"}}>
              <span style={{fontSize:13,fontWeight:600,color:"#2d4a2e"}}>{di.amount}</span>
              <span style={{fontSize:10,color:"#81c784"}}>{ing.unit}</span>
              <span style={{fontSize:10,color:"#c8e6c9"}}>✎</span>
            </button>}
          </div>
          <span style={{width:70,textAlign:"right",fontSize:12,fontWeight:500,color:lc!==null?"#e65100":"#f57f17"}}>{lc!==null?`${lc.toFixed(2)} ₽`:"нет цены"}</span>
          <button style={{width:24,height:24,border:"none",background:"none",color:"#d0d0d0",cursor:"pointer",fontSize:12,borderRadius:5}} onClick={()=>onUpdate(dish.id,{ingredients:dish.ingredients.filter(d=>d.id!==di.id)})}>✕</button>
        </div>;
      })}
      {/* Tara row */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 2px",borderTop:"1px solid #f1f8e9",marginTop:4}}>
        <span>📦</span>
        <span style={{fontSize:13,color:"#7b6a00",fontWeight:600,flexShrink:0}}>Тара</span>
        <select style={{flex:1,padding:"5px 8px",borderRadius:9,border:"1.5px solid #e8f5e9",fontSize:12,fontFamily:"'Geologica',sans-serif",background:"#fafafa",color:"#2d4a2e"}}
          value={dish.taraId||""}
          onChange={e=>{const tid=e.target.value?Number(e.target.value):null;const t=taraList.find(x=>x.id===tid);onUpdate(dish.id,{taraId:tid,taraCost:t?t.cost:0,taraName:t?t.name:""});}}>
          <option value="">— без тары —</option>
          {taraList.map(t=><option key={t.id} value={t.id}>{t.name} ({t.cost} ₽)</option>)}
        </select>
        <span style={{fontSize:12,fontWeight:500,color:dish.taraCost>0?"#e65100":"#ccc",whiteSpace:"nowrap"}}>{dish.taraCost>0?`${dish.taraCost} ₽`:"—"}</span>
      </div>
      {/* Add ingredient */}
      <div style={{display:"flex",alignItems:"center",gap:7,marginTop:10}}>
        <select style={{flex:2,padding:"6px 8px",borderRadius:9,border:"1.5px solid #e8f5e9",fontSize:12,fontFamily:"'Geologica',sans-serif",background:"#fafafa",color:"#2d4a2e"}} value={addIngId} onChange={e=>setAddIngId(e.target.value)}>
          <option value="">+ Добавить ингредиент</option>
          {avail.map(i=><option key={i.id} value={i.id}>{i.name} ({i.unit})</option>)}
        </select>
        {addIngId&&<input type="number" min="0" step="0.001" style={{width:80,padding:"6px 8px",borderRadius:9,border:"1.5px solid #e8f5e9",fontSize:12,background:"#fafafa",color:"#2d4a2e"}} placeholder="кол-во" value={addAmt} onFocus={sel} onChange={e=>setAddAmt(e.target.value)}/>}
        {addIngId&&addAmt&&<button style={{padding:"6px 12px",background:"#4caf50",color:"#fff",border:"none",borderRadius:9,fontSize:12,cursor:"pointer"}} onClick={()=>{onUpdate(dish.id,{ingredients:[...dish.ingredients,{id:Number(addIngId),amount:Number(addAmt)}]});setAddIngId("");setAddAmt("");}}>Добавить</button>}
        {cost>0&&<span style={{marginLeft:"auto",fontSize:12,color:"#e65100",fontWeight:600,whiteSpace:"nowrap"}}>с/с {cost.toFixed(2)} ₽</span>}
        <button style={{width:28,height:28,border:"none",background:"#f5f5f5",color:"#bdbdbd",cursor:"pointer",fontSize:13,borderRadius:7}} onClick={()=>onDelete(dish.id)}>🗑</button>
      </div>
    </div>}
  </div>;
}

// ── DayRow ────────────────────────────────────────────────────────────────────
function DayRow({dish,portions,dishCost,rowTotal,readOnly,chefDone,onSet}){
  const [ed,setEd]=useState(false);const [dr,setDr]=useState("");const ref=useRef();
  useEffect(()=>{if(ed&&ref.current)ref.current.focus();},[ed]);
  const commit=()=>{onSet(Math.max(0,parseInt(dr)||0));setEd(false);};
  const active=portions>0;
  return <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,marginBottom:5,border:`1.5px solid ${active?"#c8e6c9":"#f0f0f0"}`,background:active?"#fafff8":"#fff",opacity:chefDone?0.5:1}}>
    <span style={{fontSize:22,flexShrink:0,opacity:active?1:0.4}}>{dish.emoji}</span>
    <div style={{flex:1,minWidth:0}}>
      <span style={{fontFamily:"'Unbounded',sans-serif",fontWeight:700,fontSize:12,color:"#1b5e20",opacity:active?1:0.55}}>{dish.name}</span>
      {chefDone&&<span style={{marginLeft:8,fontSize:11,color:"#4caf50",fontWeight:600}}>✓ Готово</span>}
    </div>
    <span style={{width:90,textAlign:"center",fontSize:12,color:dishCost>0?"#e65100":"#ccc",fontWeight:500}}>{dishCost>0?`${dishCost.toFixed(2)} ₽`:"—"}</span>
    <div style={{width:130,display:"flex",justifyContent:"center"}}>
      {ed&&!readOnly?<div style={{display:"flex",alignItems:"center",gap:4}}>
        <input ref={ref} type="number" min="0" step="1" style={{width:56,padding:"4px 7px",borderRadius:8,border:"1.5px solid #4caf50",fontSize:13,textAlign:"right",background:"#fff",color:"#2d4a2e"}} value={dr} onChange={e=>setDr(e.target.value)} onFocus={e=>{const t=e.target;setTimeout(()=>t.select(),0);}} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}} onBlur={commit}/>
        <button style={{padding:"3px 7px",background:"#4caf50",color:"#fff",border:"none",borderRadius:7,cursor:"pointer",fontSize:12}} onMouseDown={e=>{e.preventDefault();commit();}}>✓</button>
      </div>:<button style={{display:"flex",alignItems:"center",gap:3,padding:"4px 9px",borderRadius:18,border:`1.5px solid ${active?"#a5d6a7":"#e0e0e0"}`,background:active?"#e8f5e9":"#f5f5f5",cursor:readOnly?"default":"pointer"}} onClick={readOnly?undefined:()=>{setDr(String(portions));setEd(true);}}>
        <span style={{fontSize:13,fontWeight:600,color:active?"#2e7d32":"#999"}}>{portions}</span>
        <span style={{fontSize:10,color:active?"#81c784":"#bbb"}}>порц.</span>
        {!readOnly&&<span style={{fontSize:10,color:"#c8e6c9"}}>✎</span>}
      </button>}
    </div>
    <span style={{width:100,textAlign:"right",fontSize:13,fontWeight:rowTotal>0?700:400,color:rowTotal>0?"#e65100":"#ccc"}}>{rowTotal>0?`${rowTotal.toFixed(2)} ₽`:"—"}</span>
  </div>;
}

// ── PurchaseForm ──────────────────────────────────────────────────────────────
function PurchaseForm({ingredients,onSave,onCancel,data,setData}){
  const d=data||{};
  const selIng=ingredients.find(i=>i.id===Number(d.ingId));
  const sel=e=>{const t=e.target;setTimeout(()=>t.select(),0);};
  return <div style={{background:"#fff",border:"2px solid #4caf50",borderRadius:12,padding:"14px",marginBottom:12}}>
    <div style={{fontFamily:"'Unbounded',sans-serif",fontSize:12,fontWeight:700,color:"#2e7d32",marginBottom:10}}>Новая закупка</div>
    <input style={{width:"100%",padding:"8px 11px",borderRadius:10,border:"1.5px solid #e8f5e9",fontSize:14,fontFamily:"'Geologica',sans-serif",marginBottom:8,background:"#fafafa",color:"#2d4a2e"}} placeholder="Поставщик *" value={d.supplier||""} onChange={e=>setData({...d,supplier:e.target.value})}/>
    <select style={{width:"100%",padding:"8px 11px",borderRadius:10,border:"1.5px solid #e8f5e9",fontSize:13,fontFamily:"'Geologica',sans-serif",marginBottom:8,background:"#fafafa",color:"#2d4a2e"}} value={d.ingId||""} onChange={e=>setData({...d,ingId:e.target.value})}>
      <option value="">— ингредиент (необязательно) —</option>
      {ingredients.map(i=><option key={i.id} value={i.id}>{i.name} ({i.unit})</option>)}
    </select>
    {d.ingId&&<div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
      <input type="number" min="0" step="0.001" style={{flex:1,padding:"8px 11px",borderRadius:10,border:"1.5px solid #e8f5e9",fontSize:13,background:"#fafafa",color:"#2d4a2e"}} placeholder="Количество" value={d.quantity||""} onFocus={sel} onChange={e=>setData({...d,quantity:e.target.value})}/>
      <span style={{fontSize:12,color:"#9e9e9e",whiteSpace:"nowrap"}}>{selIng?.unit||""}</span>
    </div>}
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:d.ingId&&d.quantity&&d.amount?8:0}}>
      <input type="number" min="0" step="0.01" style={{flex:1,padding:"8px 11px",borderRadius:10,border:"1.5px solid #e8f5e9",fontSize:13,background:"#fafafa",color:"#2d4a2e"}} placeholder="Сумма (₽) *" value={d.amount||""} onFocus={sel} onChange={e=>setData({...d,amount:e.target.value})} onKeyDown={e=>{if(e.key==="Enter")onSave();}}/>
      <span style={{fontSize:12,color:"#9e9e9e"}}>₽</span>
    </div>
    {d.ingId&&d.quantity&&d.amount&&<div style={{background:"#f9fbe7",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#558b2f",marginBottom:8}}>
      💡 Цена: {(Number(d.amount)/Number(d.quantity)).toFixed(3)} ₽/{selIng?.unit}
    </div>}
    <div style={{display:"flex",gap:7,justifyContent:"flex-end"}}>
      <button style={{padding:"8px 13px",background:"#f5f5f5",border:"none",borderRadius:16,fontSize:13,cursor:"pointer",color:"#555"}} onClick={onCancel}>Отмена</button>
      <button style={{padding:"8px 16px",background:"#4caf50",color:"#fff",border:"none",borderRadius:18,fontSize:13,fontWeight:500,cursor:"pointer"}} onClick={onSave}>Сохранить</button>
    </div>
  </div>;
}

document.getElementById("loading").style.display="none";
document.getElementById("root").style.display="block";
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));</script>
</body>
</html>
